/* ============================================================
   STATION PROGRESS — gare iso animée qui visualise l'avancement
   ============================================================ */
function buildStationProgressSVG(progress, activeZone) {
  // 4 états : empty / partial / done (tout vert) / active (tout rouge scintillant)
  const ISO_X = 0.866, ISO_Y = 0.5;
  const iso = (x, y, h) => { h = h || 0; return { x: (x-y)*ISO_X, y: (x+y)*ISO_Y - h }; };
  const stateFor = (pct) => pct === 0 ? 'empty' : pct >= 1 ? 'done' : 'partial';

  // Couleurs DONE — vert validé unifié pour tous les blocs
  const DONE = { top: '#4A8F66', side: '#2D6B43', sideR: '#1F4F31', stroke: '#0F3B22', text: '#FAF8F3' };

  const renderBlock = (b, palette, label, state, isActive) => {
    const A=iso(b.x,b.y,b.h), B=iso(b.x+b.w,b.y,b.h);
    const C=iso(b.x+b.w,b.y+b.d,b.h), D=iso(b.x,b.y+b.d,b.h);
    const E=iso(b.x,b.y+b.d,0), F=iso(b.x+b.w,b.y+b.d,0), G=iso(b.x+b.w,b.y,0);

    if (isActive) {
      return `<g>
        <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="#9E0B24" stroke="#1A1A1A" stroke-width="0.15">
          <animate attributeName="fill" values="#9E0B24;#E8475B;#9E0B24" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="#9E0B24" stroke="#1A1A1A" stroke-width="0.15" opacity="0.85">
          <animate attributeName="fill" values="#9E0B24;#E8475B;#9E0B24" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}" fill="#C8102E" stroke="#1A1A1A" stroke-width="0.15">
          <animate attributeName="fill" values="#C8102E;#E8475B;#C8102E" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        ${label ? `<text x="${(A.x+C.x)/2}" y="${(A.y+C.y)/2+0.7}" font-size="2" font-weight="700" fill="#FAF8F3" text-anchor="middle">${label}</text>` : ''}
      </g>`;
    }

    if (state === 'empty') {
      const g0=iso(b.x,b.y,0), g1=iso(b.x+b.w,b.y,0);
      const g2=iso(b.x+b.w,b.y+b.d,0), g3=iso(b.x,b.y+b.d,0);
      return `<g opacity="0.5">
        <polygon points="${g0.x},${g0.y} ${g1.x},${g1.y} ${g2.x},${g2.y} ${g3.x},${g3.y}"
          fill="none" stroke="#8B8680" stroke-width="0.2" stroke-dasharray="0.8,0.6"/>
        ${label ? `<text x="${(g0.x+g2.x)/2}" y="${(g0.y+g2.y)/2+0.6}" font-size="1.6" fill="#8B8680" text-anchor="middle" font-style="italic">${label}</text>` : ''}
      </g>`;
    }

    if (state === 'done') {
      // Volume entier en VERT validé
      return `<g>
        <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="${DONE.sideR}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="${DONE.side}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}" fill="${DONE.top}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        ${label ? `<text x="${(A.x+C.x)/2}" y="${(A.y+C.y)/2+0.7}" font-size="2" font-weight="700" fill="${DONE.text}" text-anchor="middle">${label}</text>` : ''}
      </g>`;
    }

    // partial : couleur naturelle estompée
    return `<g opacity="0.55">
      <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="${palette.side}" stroke="#1A1A1A" stroke-width="0.12"/>
      <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="${palette.side}" stroke="#1A1A1A" stroke-width="0.12" opacity="0.85"/>
      <polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}" fill="${palette.top}" stroke="#1A1A1A" stroke-width="0.12"/>
      ${label ? `<text x="${(A.x+C.x)/2}" y="${(A.y+C.y)/2+0.7}" font-size="1.8" font-weight="600" fill="#5A5A5A" text-anchor="middle">${label}</text>` : ''}
    </g>`;
  };

  // BV avec toit en pignon
  const renderBVWithRoof = (b, state, isActive) => {
    const wallH = b.h, roofExtra = 1.4, overhang = 0.5;
    const A=iso(b.x,b.y,wallH), B=iso(b.x+b.w,b.y,wallH);
    const C=iso(b.x+b.w,b.y+b.d,wallH), D=iso(b.x,b.y+b.d,wallH);
    const E=iso(b.x,b.y+b.d,0), F=iso(b.x+b.w,b.y+b.d,0), G=iso(b.x+b.w,b.y,0);
    const ridgeY = b.y + b.d/2, ridgeH = wallH + roofExtra;
    const r1=iso(b.x-overhang,b.y-overhang,wallH), r2=iso(b.x+b.w+overhang,b.y-overhang,wallH);
    const r3=iso(b.x+b.w+overhang,b.y+b.d+overhang,wallH), r4=iso(b.x-overhang,b.y+b.d+overhang,wallH);
    const ridgeL=iso(b.x-overhang,ridgeY,ridgeH), ridgeR=iso(b.x+b.w+overhang,ridgeY,ridgeH);
    const pgN_W=iso(b.x,b.y,wallH), pgS_W=iso(b.x,b.y+b.d,wallH), pgM_W=iso(b.x,ridgeY,ridgeH);
    const pgN_E=iso(b.x+b.w,b.y,wallH), pgS_E=iso(b.x+b.w,b.y+b.d,wallH), pgM_E=iso(b.x+b.w,ridgeY,ridgeH);

    if (isActive) {
      return `<g>
        <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="#9E0B24" stroke="#1A1A1A" stroke-width="0.15">
          <animate attributeName="fill" values="#9E0B24;#E8475B;#9E0B24" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="#9E0B24" stroke="#1A1A1A" stroke-width="0.15" opacity="0.85">
          <animate attributeName="fill" values="#9E0B24;#E8475B;#9E0B24" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="${pgN_E.x},${pgN_E.y} ${pgM_E.x},${pgM_E.y} ${pgS_E.x},${pgS_E.y}" fill="#C8102E" stroke="#1A1A1A" stroke-width="0.15">
          <animate attributeName="fill" values="#C8102E;#E8475B;#C8102E" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="${r1.x},${r1.y} ${r2.x},${r2.y} ${ridgeR.x},${ridgeR.y} ${ridgeL.x},${ridgeL.y}" fill="#7A0820" stroke="#1A1A1A" stroke-width="0.15"/>
        <polygon points="${ridgeL.x},${ridgeL.y} ${ridgeR.x},${ridgeR.y} ${r3.x},${r3.y} ${r4.x},${r4.y}" fill="#9E0B24" stroke="#1A1A1A" stroke-width="0.15">
          <animate attributeName="fill" values="#9E0B24;#E8475B;#9E0B24" dur="1.4s" repeatCount="indefinite"/>
        </polygon>
        <text x="${pgN_E.x + 1}" y="${pgM_E.y + 1.5}" font-size="1.6" font-weight="700" fill="#FAF8F3">BV</text>
      </g>`;
    }
    if (state === 'empty') {
      const g0=iso(b.x,b.y,0), g1=iso(b.x+b.w,b.y,0);
      const g2=iso(b.x+b.w,b.y+b.d,0), g3=iso(b.x,b.y+b.d,0);
      return `<g opacity="0.5">
        <polygon points="${g0.x},${g0.y} ${g1.x},${g1.y} ${g2.x},${g2.y} ${g3.x},${g3.y}" fill="none" stroke="#8B8680" stroke-width="0.2" stroke-dasharray="0.8,0.6"/>
        <text x="${(g0.x+g2.x)/2}" y="${(g0.y+g2.y)/2+0.6}" font-size="1.6" fill="#8B8680" text-anchor="middle" font-style="italic">BV</text>
      </g>`;
    }
    if (state === 'done') {
      // BV entier en vert (murs + toit + pignons)
      return `<g>
        <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="${DONE.sideR}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="${DONE.side}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${pgN_E.x},${pgN_E.y} ${pgM_E.x},${pgM_E.y} ${pgS_E.x},${pgS_E.y}" fill="${DONE.top}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${r1.x},${r1.y} ${r2.x},${r2.y} ${ridgeR.x},${ridgeR.y} ${ridgeL.x},${ridgeL.y}" fill="${DONE.sideR}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${ridgeL.x},${ridgeL.y} ${ridgeR.x},${ridgeR.y} ${r3.x},${r3.y} ${r4.x},${r4.y}" fill="${DONE.top}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <polygon points="${pgN_W.x},${pgN_W.y} ${pgM_W.x},${pgM_W.y} ${pgS_W.x},${pgS_W.y}" fill="${DONE.side}" stroke="${DONE.stroke}" stroke-width="0.15"/>
        <text x="${pgN_E.x + 1}" y="${pgM_E.y + 1.5}" font-size="1.6" font-weight="700" fill="${DONE.text}">BV</text>
      </g>`;
    }
    // partial — couleur naturelle estompée
    return `<g opacity="0.55">
      <polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="#C8C3B5" stroke="#1A1A1A" stroke-width="0.12"/>
      <polygon points="${C.x},${C.y} ${F.x},${F.y} ${E.x},${E.y} ${D.x},${D.y}" fill="#C8C3B5" stroke="#1A1A1A" stroke-width="0.12" opacity="0.85"/>
      <polygon points="${pgN_E.x},${pgN_E.y} ${pgM_E.x},${pgM_E.y} ${pgS_E.x},${pgS_E.y}" fill="#D4CFC0" stroke="#1A1A1A" stroke-width="0.12"/>
      <polygon points="${r1.x},${r1.y} ${r2.x},${r2.y} ${ridgeR.x},${ridgeR.y} ${ridgeL.x},${ridgeL.y}" fill="#3A4A55" stroke="#1A1A1A" stroke-width="0.12"/>
      <polygon points="${ridgeL.x},${ridgeL.y} ${ridgeR.x},${ridgeR.y} ${r3.x},${r3.y} ${r4.x},${r4.y}" fill="#4D5E6B" stroke="#1A1A1A" stroke-width="0.12"/>
      <polygon points="${pgN_W.x},${pgN_W.y} ${pgM_W.x},${pgM_W.y} ${pgS_W.x},${pgS_W.y}" fill="#B8B3A5" stroke="#1A1A1A" stroke-width="0.12" opacity="0.85"/>
      <text x="${pgN_E.x + 1}" y="${pgM_E.y + 1.5}" font-size="1.6" font-weight="700" fill="#1A1A1A">BV</text>
    </g>`;
  };

  const renderTree = (x, y) => {
    const baseT=iso(x,y,0), topT=iso(x,y,3);
    return `<g><line x1="${baseT.x}" y1="${baseT.y}" x2="${topT.x}" y2="${topT.y}" stroke="#5A4A3A" stroke-width="0.3"/><circle cx="${topT.x}" cy="${topT.y}" r="1.6" fill="#7A9970" stroke="#5A7A55" stroke-width="0.15"/></g>`;
  };

  // === TRAIN ULTRA-SIMPLE ===
  // Juste une boîte rouge avec un toit gris, des fenêtres et un pare-brise. Minimaliste.
  const renderTrainSimple = (faded) => {
    // Train minimal : 3 wagons noirs rectangulaires reliés, avec roues
    const wagonW = 5, wagonH = 1.5, wagonD = 2;
    const gap = 0.5;
    const nWagons = 3;
    const yMid = 4, yN = yMid - wagonD/2, yS = yMid + wagonD/2;
    const tbase = 0.3;
    const top = tbase + wagonH;

    const xS=-22, xE=120;
    const dx = iso(xE,0,0).x - iso(xS,0,0).x;
    const dy = iso(xE,0,0).y - iso(xS,0,0).y;
    const sx = iso(xS,0,0).x - iso(0,0,0).x;
    const sy = iso(xS,0,0).y - iso(0,0,0).y;
    const grpOpa = faded ? 0.4 : 1;

    let svg = `<g opacity="${grpOpa}"><animateTransform attributeName="transform" type="translate" from="${sx} ${sy}" to="${sx+dx} ${sy+dy}" dur="14s" repeatCount="indefinite"/>`;

    // Pour chaque wagon
    for (let i = 0; i < nWagons; i++) {
      const x0 = i * (wagonW + gap);
      const x1 = x0 + wagonW;
      const A=iso(x0,yN,top), B=iso(x1,yN,top);
      const C=iso(x1,yS,top), D=iso(x0,yS,top);
      const E=iso(x0,yS,tbase), F=iso(x1,yS,tbase);
      const G=iso(x1,yN,tbase);

      // Face droite (sur le dernier wagon, plus visible)
      svg += `<polygon points="${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y} ${C.x},${C.y}" fill="#0A0A0A" stroke="#1A1A1A" stroke-width="0.12"/>`;
      // Face sud (côté observateur)
      svg += `<polygon points="${E.x},${E.y} ${F.x},${F.y} ${C.x},${C.y} ${D.x},${D.y}" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="0.12"/>`;
      // Toit
      svg += `<polygon points="${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="0.12"/>`;

      // 2 roues par wagon
      [x0+0.8, x1-0.8].forEach(rx => {
        const w = iso(rx, yS-0.2, 0.05);
        svg += `<circle cx="${w.x}" cy="${w.y}" r="0.38" fill="#1A1A1A" stroke="#5A5A5A" stroke-width="0.1"/>`;
      });
    }

    // Attelages entre wagons (petite barre noire)
    for (let i = 0; i < nWagons - 1; i++) {
      const xa = (i+1) * wagonW + i * gap;
      const xb = xa + gap;
      const a1 = iso(xa, yMid, tbase + 0.4);
      const a2 = iso(xb, yMid, tbase + 0.4);
      svg += `<line x1="${a1.x}" y1="${a1.y}" x2="${a2.x}" y2="${a2.y}" stroke="#1A1A1A" stroke-width="0.25"/>`;
    }

    // Phare jaune sur le wagon de tête (le plus à droite, sens de marche)
    const headX = (nWagons - 1) * (wagonW + gap) + wagonW;
    const ph = iso(headX - 0.1, yS, tbase + wagonH/2);
    svg += `<circle cx="${ph.x}" cy="${ph.y}" r="0.32" fill="#FFE76A" stroke="#1A1A1A" stroke-width="0.06"><animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/></circle>`;

    svg += `</g>`;
    return svg;
  };

  // Volumes
  const Q1 = { x:5, y:1, w:85, d:2.5, h:1 };
  const Q2 = { x:5, y:6.5, w:85, d:2.5, h:1 };
  const BV = { x:38, y:13, w:18, d:6, h:5.5 };
  const VELOS = { x:17, y:13, w:7, d:5, h:1.8 };
  const TC = { x:26, y:13, w:9, d:5, h:2.2 };
  const PARK = { x:60, y:13, w:26, d:7, h:0.6 };
  const PARV = { x:14, y:21, w:72, d:3, h:0.3 };
  const FR = { x:45, y:1, w:4, d:8, h:2 };  // <-- encore plus bas (2 au lieu de 3.5)
  const ROUTE_Y = 26, RAILS_LEN = 95;

  const PAL = {
    quais:   { top:'#F5F2EB', side:'#D9D3C4' },
    velos:   { top:'#E5E7EB', side:'#9CA3AF' },
    tc:      { top:'#E5E7EB', side:'#9CA3AF' },
    parking: { top:'#EDE8DD', side:'#D9D3C4' },
    parvis:  { top:'#EDE6D8', side:'#D4C9B0' },
    franch:  { top:'#9CA3AF', side:'#6B7280' }
  };

  const corners = [iso(0,0,0), iso(95,0,0), iso(0,30,0), iso(95,30,0), iso(45,1,4)];
  const minX = Math.min.apply(null, corners.map(p=>p.x)) - 6;
  const maxX = Math.max.apply(null, corners.map(p=>p.x)) + 6;
  const minY = Math.min.apply(null, corners.map(p=>p.y)) - 10;
  const maxY = Math.max.apply(null, corners.map(p=>p.y)) + 8;

  let svg = `<svg viewBox="${minX} ${minY} ${maxX-minX} ${maxY-minY}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;

  // Sol
  const g1=iso(0,0,0), g2=iso(95,0,0), g3=iso(95,32,0), g4=iso(0,32,0);
  svg += `<polygon points="${g1.x},${g1.y} ${g2.x},${g2.y} ${g3.x},${g3.y} ${g4.x},${g4.y}" fill="#F5F2EB" stroke="#EDE8DD" stroke-width="0.3"/>`;

  // Route
  const r1=iso(0,ROUTE_Y,0), r2=iso(95,ROUTE_Y,0), r3=iso(95,32,0), r4=iso(0,32,0);
  svg += `<polygon points="${r1.x},${r1.y} ${r2.x},${r2.y} ${r3.x},${r3.y} ${r4.x},${r4.y}" fill="#5A5A5A" stroke="#1A1A1A" stroke-width="0.15"/>`;
  const tr1=iso(0,ROUTE_Y-0.4,0.05), tr2=iso(95,ROUTE_Y-0.4,0.05);
  const tr3=iso(95,ROUTE_Y,0.05), tr4=iso(0,ROUTE_Y,0.05);
  svg += `<polygon points="${tr1.x},${tr1.y} ${tr2.x},${tr2.y} ${tr3.x},${tr3.y} ${tr4.x},${tr4.y}" fill="#BFB9AC"/>`;
  for (let i = 0; i < 9; i++) {
    const cx = 5 + i * 11;
    const m1=iso(cx,(ROUTE_Y+32)/2,0.1), m2=iso(cx+5,(ROUTE_Y+32)/2,0.1);
    svg += `<line x1="${m1.x}" y1="${m1.y}" x2="${m2.x}" y2="${m2.y}" stroke="#F5F2EB" stroke-width="0.5"/>`;
  }

  // Rails
  [4, 5].forEach(vy => {
    const aa=iso(0,vy-0.6,0.1), bb=iso(RAILS_LEN,vy-0.6,0.1);
    const cc=iso(0,vy+0.6,0.1), dd=iso(RAILS_LEN,vy+0.6,0.1);
    const p1=iso(0,vy-1,0), p2=iso(RAILS_LEN,vy-1,0);
    const p3=iso(RAILS_LEN,vy+1,0), p4=iso(0,vy+1,0);
    svg += `<polygon points="${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y} ${p4.x},${p4.y}" fill="#D9D3C4" opacity="0.5"/>`;
    svg += `<line x1="${aa.x}" y1="${aa.y}" x2="${bb.x}" y2="${bb.y}" stroke="#1A1A1A" stroke-width="0.4"/>`;
    svg += `<line x1="${cc.x}" y1="${cc.y}" x2="${dd.x}" y2="${dd.y}" stroke="#1A1A1A" stroke-width="0.4"/>`;
  });

  // Quais
  svg += renderBlock(Q1, PAL.quais, null, stateFor(progress.quais), activeZone === 'quais');
  svg += renderBlock(Q2, PAL.quais, null, stateFor(progress.quais), activeZone === 'quais');

  // Train simple
  svg += renderTrainSimple(progress.quais < 1);

  // BV
  svg += renderBVWithRoof(BV, stateFor(progress.bv), activeZone === 'bv');

  // Intermodal
  svg += renderBlock(VELOS, PAL.velos, 'Vélos', stateFor(progress.velos), activeZone === 'velos');
  svg += renderBlock(TC, PAL.tc, 'TC', stateFor(progress.tc), activeZone === 'tc');
  svg += renderBlock(PARK, PAL.parking, 'Parking', stateFor(progress.parking), activeZone === 'parking' || activeZone === 'parking2');
  // Parvis (lié à parvis dans nouveau SECTIONS, abords pour rétro-compat)
  svg += renderBlock(PARV, PAL.parvis, null, stateFor(progress.parvis ?? progress.abords ?? 0), activeZone === 'parvis' || activeZone === 'abords');
  // Passerelle
  svg += renderBlock(FR, PAL.franch, null, stateFor(progress.franch), activeZone === 'franch');

  // Arbres
  if (progress.abords >= 0.5) {
    svg += renderTree(3,14) + renderTree(92,14) + renderTree(3,24) + renderTree(92,24);
  }

  // === LOGO BUREAU en haut à droite ===
  const isBureauActive = activeZone === 'bureau';
  const isBureauDone = progress.bureau >= 1;
  const logoX = maxX - 12;
  const logoY = minY + 8;

  svg += `<g transform="translate(${logoX} ${logoY})">`;
  if (isBureauActive) {
    svg += `<circle cx="0" cy="0" r="4" fill="#C8102E" opacity="0.3">
      <animate attributeName="r" values="4;7;4" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>`;
  }
  // Couleur du logo selon état : actif=rouge / done=vert / partial-empty=fond clair
  const logoBg = isBureauActive ? '#C8102E' : (isBureauDone ? '#4A8F66' : '#FAF8F3');
  const logoFg = (isBureauActive || isBureauDone) ? '#FAF8F3' : '#1A1A1A';
  const logoStroke = isBureauActive ? '#9E0B24' : (isBureauDone ? '#1F4F31' : '#1A1A1A');
  svg += `<circle cx="0" cy="0" r="3.4" fill="${logoBg}" stroke="${logoStroke}" stroke-width="0.25">`;
  if (isBureauActive) {
    svg += `<animate attributeName="fill" values="#C8102E;#E8475B;#C8102E" dur="1.4s" repeatCount="indefinite"/>`;
  }
  svg += `</circle>`;
  svg += `<rect x="-2.2" y="0.4" width="4.4" height="0.4" fill="${logoFg}" rx="0.1"/>`;
  svg += `<rect x="-2" y="0.8" width="0.3" height="1.3" fill="${logoFg}"/>`;
  svg += `<rect x="1.7" y="0.8" width="0.3" height="1.3" fill="${logoFg}"/>`;
  svg += `<rect x="-1.3" y="-0.2" width="1.7" height="0.6" fill="${logoFg}" opacity="0.95" rx="0.05"/>`;
  svg += `<line x1="-1" y1="0.05" x2="0.1" y2="0.05" stroke="${logoBg}" stroke-width="0.08"/>`;
  svg += `<line x1="-1" y1="0.2" x2="0.0" y2="0.2" stroke="${logoBg}" stroke-width="0.08"/>`;
  svg += `<line x1="1" y1="0.4" x2="1" y2="-0.6" stroke="${logoFg}" stroke-width="0.18"/>`;
  svg += `<line x1="1" y1="-0.6" x2="1.7" y2="-1.1" stroke="${logoFg}" stroke-width="0.18"/>`;
  svg += `<polygon points="1.7,-1.1 2.1,-1.4 1.95,-0.85 1.55,-0.95" fill="${logoFg}"/>`;
  svg += `</g>`;
  // Label BUREAU
  const labelColor = isBureauActive ? '#C8102E' : (isBureauDone ? '#1F4F31' : '#8B8680');
  svg += `<text x="${logoX}" y="${logoY + 6.5}" font-size="1.4" fill="${labelColor}" text-anchor="middle" font-weight="${isBureauActive || isBureauDone ? '700' : '500'}" letter-spacing="0.05">BUREAU</text>`;

  svg += '</svg>';
  return svg;
}

function StationProgress({ gare, visite, activeId }) {
  // Calculer l'avancement par section (0..1)
  const progress = {};
  SECTIONS.forEach((s) => {
    if (s.skipIf && s.skipIf(gare, visite.data)) {
      progress[s.id] = 1; // section skippée = considérée comme "faite"
    } else {
      const st = sectionStats(s, visite.data);
      progress[s.id] = st.total === 0 ? 0 : st.filled / st.total;
    }
  });

  // Génère le SVG comme string et l'injecte via dangerouslySetInnerHTML
  const svgHtml = buildStationProgressSVG(progress, activeId);

  return (
    <div
      dangerouslySetInnerHTML={{ __html: svgHtml }}
      style={{ width: '100%' }} />);

}


function FormScreen({ gare, visite, onUpdate, onBack, onOverview, onDelete, onToast }) {
  const sections = useMemo(
    () => SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data)),
    [gare, visite.data]
  );
  const [activeId, setActiveId] = useState(sections[0].id);
  // If the active section becomes hidden (e.g. user marked BV as Absent), fall back to first
  useEffect(() => {
    if (!sections.find((s) => s.id === activeId)) {
      setActiveId(sections[0]?.id);
    }
  }, [sections, activeId]);
  const stats = visiteStats(gare, visite.data);
  const activeSection = sections.find((s) => s.id === activeId) || sections[0];
  const activeIdx = sections.findIndex((s) => s.id === (activeSection?.id));
  const sStats = activeSection ? sectionStats(activeSection, visite.data) : { filled: 0, total: 0 };

  /* Update val while preserving note/photos if present.
     val peut être : primitive (string/number/boolean), array (multi-select), objet composite (pn/pne) */
  const setVal = (cid, val) => {
    const cur = visite.data[cid];
    const hasExtras = cur && typeof cur === 'object' && !Array.isArray(cur)
      && (cur.note || (cur.photos && cur.photos.length));
    let next;
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) {
      // Composite (pn/pne) : flat-merge avec extras existants
      next = hasExtras
        ? { ...val, note: cur.note || '', photos: cur.photos || [] }
        : val;
    } else if (hasExtras) {
      // Primitive/array : préserver note/photos via { val, note, photos }
      next = { ...cur, val };
    } else {
      next = val;
    }
    onUpdate({ ...visite, data: { ...visite.data, [cid]: next }, updated: Date.now() });
  };
  const clearVal = (cid) => {
    const d = { ...visite.data };delete d[cid];
    onUpdate({ ...visite, data: d, updated: Date.now() });
  };
  /* Update note (always promotes data[id] to object form) */
  const setNote = (cid, note) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    onUpdate({ ...visite, data: { ...visite.data, [cid]: { ...obj, note } }, updated: Date.now() });
  };
  const setPhotos = (cid, photos) => {
    const cur = visite.data[cid];
    const obj = (cur && typeof cur === 'object' && !Array.isArray(cur)) ? cur : { val: cur };
    onUpdate({ ...visite, data: { ...visite.data, [cid]: { ...obj, photos } }, updated: Date.now() });
  };

  // Auto-advance helper
  const goToNext = () => {
    if (activeIdx < sections.length - 1) {
      setActiveId(sections[activeIdx + 1].id);
      // scroll panel to top
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };
  const goToPrev = () => {
    if (activeIdx > 0) {
      setActiveId(sections[activeIdx - 1].id);
      const panel = document.getElementById('panel-scroll');
      if (panel) panel.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  // Swipe support
  const touchRef = useRef({ x: 0, active: false });
  const onTouchStart = (e) => {touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, active: true };};
  const onTouchEnd = (e) => {
    if (!touchRef.current.active) return;
    const dx = e.changedTouches[0].clientX - touchRef.current.x;
    const dy = Math.abs(e.changedTouches[0].clientY - touchRef.current.y);
    if (Math.abs(dx) > 60 && dy < 50) {
      if (dx < 0) goToNext();else goToPrev();
    }
    touchRef.current.active = false;
  };

  const hasBV = !sections.find((s) => s.id === 'bv') ? false : true;
  const hasFranch = !sections.find((s) => s.id === 'franch') ? false : true;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      {/* TOP BAR */}
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0, gap: 8 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6 }}>
          ← <span className="kicker" style={{ fontSize: 10 }}>Carnet</span>
        </button>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={onOverview} style={{ color: 'var(--paper)', fontSize: 11, padding: '5px 10px',
            border: '1px solid rgba(245,242,235,0.2)', borderRadius: 2,
            display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3 }}>
              <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1" />
                <circle cx="6" cy="6" r="1.5" fill="currentColor" />
              </svg>
              Vue d'ensemble
            </span>
          </button>
          <button onClick={onDelete} title="Supprimer cette visite" style={{
            color: 'var(--paper)', fontSize: 13, padding: '5px 9px',
            border: '1px solid rgba(245,242,235,0.2)', borderRadius: 2, opacity: 0.7
          }}>🗑</button>
        </div>
      </div>

      {/* GARE HEADING + PLAN */}
      <div style={{ background: 'var(--paper-light)', borderBottom: '1px solid var(--border)', flexShrink: 0 }}>
        <div style={{ padding: '14px 18px 6px', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="kicker" style={{ color: 'var(--red)', fontSize: 9.5, marginBottom: 4 }}>
              {gare.cat_sgp} · {gare.ligne_flux}
            </div>
            <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.025em', lineHeight: 1.05 }}>{gare.nom}</h2>
            <div style={{ fontSize: 10.5, color: 'var(--taupe)', marginTop: 3, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
              UIC {gare.uic} · {gare.secteur}
            </div>
            {/* Typologie morphologique — déduite du plan de voies, pour le rendu iso */}
            <div style={{
              display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 7,
              padding: '3px 8px', background: 'var(--paper-deep)',
              border: '1px solid var(--border)', borderRadius: 2,
              fontSize: 10, color: 'var(--ink-soft)', fontWeight: 500, letterSpacing: '0.02em'
            }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: 'var(--ink-soft)' }} />
              {getTypologie(gare)}
            </div>
          </div>
          <ProgressRing pct={stats.pct} size={48} />
        </div>

        {/* GARE ISO ANIMÉE — visualise l'avancement du relevé */}
        <div style={{ padding: '0 14px 10px' }}>
          <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '6px 8px 4px' }}>
            <StationProgress gare={gare} visite={visite} activeId={activeId} />
          </div>
        </div>

        {/* SECTION CHIPS — horizontal scroll */}
        <div style={{ display: 'flex', gap: 6, padding: '4px 14px 12px', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
          {sections.map((s) => {
            const st = sectionStats(s, visite.data);
            const done = st.filled === st.total && st.total > 0;
            const partial = st.filled > 0 && !done;
            const active = s.id === activeId;
            return (
              <button key={s.id} onClick={() => setActiveId(s.id)} style={{
                flexShrink: 0, display: 'inline-flex', alignItems: 'center', gap: 6,
                padding: '6px 11px', borderRadius: 99,
                background: active ? 'var(--red)' : s.bureau ? 'var(--bureau-bg)' : 'var(--white)',
                color: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--ink-soft)',
                border: `1px solid ${active ? 'var(--red)' : done ? 'var(--green-soft)' : 'var(--border)'}`,
                fontSize: 11.5, fontWeight: active ? 600 : 500, whiteSpace: 'nowrap'
              }}>
                <span className="tabular" style={{
                  width: 16, height: 16, borderRadius: '50%',
                  background: active ? 'var(--paper-light)' : done ? 'var(--green)' : 'var(--paper-deep)',
                  color: active ? 'var(--red)' : done ? 'var(--paper-light)' : 'var(--taupe)',
                  fontSize: 9.5, fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center'
                }}>{done ? '✓' : s.n}</span>
                {s.short}
                {partial && !active &&
                <span className="tabular" style={{ fontSize: 9.5, color: 'var(--taupe)' }}>{st.filled}/{st.total}</span>
                }
              </button>);

          })}
        </div>
      </div>

      {/* SECTION PANEL — full focus */}
      <div id="panel-scroll" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{ flex: 1, overflowY: 'auto', background: activeSection.bureau ? '#F5F7F9' : 'var(--white)', minHeight: 0 }}>
        <div style={{ padding: '18px 18px 100px' }}>
          {activeSection.bureau && !activeSection.fluxLocked &&
          <div style={{ background: 'var(--bureau)', color: 'var(--paper-light)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, borderRadius: 2, lineHeight: 1.4 }}>
              <strong>À remplir au bureau</strong> — données SIG / desk research, pas pendant la visite.
            </div>
          }
          {activeSection.synth &&
          <div style={{ background: 'var(--red-tint)', borderLeft: '3px solid var(--red)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink)', lineHeight: 1.4 }}>
              <strong>Synthèse de visite</strong> — ressenti global + classifications. À remplir en fin de visite.
            </div>
          }
          {activeSection.id === 'pmr' &&
          <div style={{ background: 'var(--paper)', borderLeft: '3px solid var(--ink)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              <strong>Accessibilité PMR (en cours)</strong> — relevé des dispositifs pour
              tous les types de handicap : moteur, visuel, auditif, intellectuel/psychique.
            </div>
          }
          {activeSection.id === 'parking2' &&
          <div style={{ background: 'var(--amber-tint)', borderLeft: '3px solid var(--amber)', padding: '10px 12px',
            fontSize: 12, marginBottom: 16, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
              <strong>2e parking détecté</strong> — la caractérisation montre plusieurs types de
              stationnement. Renseigne ici les caractéristiques du second.
            </div>
          }

          {/* SECTION HEADER */}
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14, marginBottom: 18 }}>
            <div className="tabular" style={{
              fontSize: 36, fontWeight: 700, lineHeight: 0.9,
              color: activeSection.bureau ? 'var(--bureau)' : 'var(--red)',
              fontFamily: 'var(--font-display)', letterSpacing: '-0.04em'
            }}>{String(Math.floor(activeSection.n)).padStart(2, '0')}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <h3 style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.1, letterSpacing: '-0.015em' }}>{activeSection.title}</h3>
              <div style={{ fontSize: 11.5, color: 'var(--taupe)', marginTop: 3 }}>{activeSection.subtitle}</div>
            </div>
            <div style={{ textAlign: 'right', flexShrink: 0 }}>
              <div className="tabular" style={{ fontSize: 13, fontWeight: 700,
                color: sStats.filled === sStats.total ? 'var(--green)' : 'var(--ink)' }}>
                {sStats.filled}<span style={{ color: 'var(--taupe-light)', fontWeight: 500 }}>/{sStats.total}</span>
              </div>
              <div style={{ fontSize: 9.5, color: 'var(--taupe)', letterSpacing: '0.06em', textTransform: 'uppercase' }}>relevés</div>
            </div>
          </div>
          <div style={{ height: 1.5, background: 'var(--ink)', width: 30, marginBottom: 18 }} />

          {/* Bouton next-section compact en haut — pour ne pas avoir à scroller */}
          {activeIdx < sections.length - 1 &&
          <button onClick={goToNext} style={{
            width: '100%', padding: '8px 12px', marginBottom: 16,
            background: 'transparent', border: '1px dashed var(--border)', borderRadius: 2,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            fontSize: 11.5, color: 'var(--taupe)', letterSpacing: '0.02em'
          }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 9.5, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Sauter à</span>
              <span style={{ color: 'var(--ink)', fontWeight: 500 }}>{sections[activeIdx + 1]?.short}</span>
            </span>
            <span style={{ color: 'var(--ink)' }}>→</span>
          </button>
          }

          {/* CRITERIA */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            {activeSection.criteria.map((c) =>
            <Criterion key={c.id} c={c} raw={visite.data[c.id]}
              gareName={gare.nom}
              locked={false}
              onSetVal={(v) => setVal(c.id, v)}
              onSetNote={(n) => setNote(c.id, n)}
              onSetPhotos={(p) => setPhotos(c.id, p)}
              onClear={() => clearVal(c.id)}
              onToast={onToast} />
            )}
          </div>

          {/* FOOTER NAV inside panel */}
          <div style={{ marginTop: 30, padding: '18px 0 0', borderTop: '1px dashed var(--border)' }}>
            {sStats.filled === sStats.total && sStats.total > 0 &&
            <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
                <Stamp color="var(--green)">section complète</Stamp>
                <span style={{ fontSize: 11, color: 'var(--green)', fontStyle: 'italic' }}>vue {fmtAgo(visite.updated)}</span>
              </div>
            }
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={goToPrev} disabled={activeIdx === 0} style={{
                flex: 1, padding: '13px 14px', background: 'var(--white)', border: '1px solid var(--border)',
                borderRadius: 2, fontWeight: 500, fontSize: 13, color: activeIdx === 0 ? 'var(--taupe-light)' : 'var(--ink)',
                opacity: activeIdx === 0 ? 0.4 : 1, display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center'
              }}>
                ← <span style={{ fontSize: 11, color: 'var(--taupe)' }}>{sections[activeIdx - 1]?.short || ''}</span>
              </button>
              <button onClick={goToNext} disabled={activeIdx === sections.length - 1} style={{
                flex: 2, padding: '13px 14px', background: 'var(--ink)', color: 'var(--paper-light)',
                borderRadius: 2, fontWeight: 600, fontSize: 13, letterSpacing: '0.04em', textTransform: 'uppercase',
                opacity: activeIdx === sections.length - 1 ? 0.4 : 1,
                display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center'
              }}>
                {activeIdx === sections.length - 1 ? 'Fin' : <>Section suivante · <span style={{ fontWeight: 400, textTransform: 'none', letterSpacing: 0, opacity: 0.85 }}>{sections[activeIdx + 1]?.short}</span> →</>}
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* FAB SORTIR — toujours accessible, en bas à droite, par-dessus tout le contenu */}
      <button onClick={onBack} title="Sortir de cette gare et revenir au carnet"
        aria-label="Sortir et retourner au carnet"
        style={{
          position: 'fixed', bottom: 20, right: 16,
          width: 52, height: 52, borderRadius: '50%',
          background: 'var(--ink)', color: 'var(--paper-light)',
          border: '3px solid var(--paper-light)',
          boxShadow: '0 4px 14px rgba(26,26,26,0.25), 0 1px 3px rgba(26,26,26,0.15)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 50, cursor: 'pointer',
          transition: 'transform 0.15s ease, background 0.15s ease'
        }}
        onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--red)'; e.currentTarget.style.transform = 'scale(1.05)'; }}
        onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--ink)'; e.currentTarget.style.transform = 'scale(1)'; }}
      >
        {/* Icône maison stylisée (= retour carnet/accueil) */}
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M3 11.5 L12 4 L21 11.5" />
          <path d="M5 10 V20 H10 V14 H14 V20 H19 V10" />
        </svg>
      </button>
    </div>);

}

/* ============================================================
   CRITERION
   ============================================================ */
function Criterion({ c, raw, gareName, onSetVal, onSetNote, onSetPhotos, onClear, onToast, locked }) {
  // Sub-head : juste un séparateur visuel dans une section (PMR, Synthèse)
  if (c.type === 'subhead') {
    return (
      <div style={{
        marginTop: 6, marginBottom: -4, paddingTop: 14, paddingBottom: 6,
        borderTop: '1.5px solid var(--ink)',
        display: 'flex', alignItems: 'center', gap: 10
      }}>
        <span style={{ width: 14, height: 14, borderRadius: '50%',
          background: 'var(--ink)', color: 'var(--paper-light)',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 9, fontWeight: 700 }}>♿</span>
        <h4 style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.04em',
          textTransform: 'uppercase', color: 'var(--ink)' }}>{c.label}</h4>
      </div>
    );
  }

  // Composite values : pne (présence + nombre + état), pn (présence + nombre)
  // Stockés en objet : { presence: 'yes'|'no', nb: N, etat: 0..1 }
  // Le getVal/isFilled les voit comme remplis dès qu'au moins un sous-champ est posé
  const value = getVal(raw);
  const note = getNote(raw);
  const photos = getPhotos(raw);
  const filled = isFilled(c, raw);
  const hasExtras = !!note;
  const [showExtras, setShowExtras] = useState(hasExtras);
  const [uploading, setUploading] = useState(false);
  const cameraInputRef = useRef(null);
  const galleryInputRef = useRef(null);

  const handleFileChange = async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    e.target.value = '';
    setUploading(true);
    let next = [...photos];
    for (const file of files) {
      try {
        const photo = await uploadPhoto(gareName, c.id, file);
        next = [...next, photo];
        onSetPhotos(next);
        if (onToast) onToast('Photo ajoutée ✓', 'success');
      } catch (err) {
        console.warn('Upload error:', err);
        if (onToast) onToast('⚠ Échec upload', 'error');
      }
    }
    setUploading(false);
  };

  const removePhotoAt = async (idx) => {
    if (!confirm('Supprimer cette photo ?')) return;
    const photo = photos[idx];
    await deletePhoto(photo);
    const next = photos.filter((_, i) => i !== idx);
    onSetPhotos(next);
    if (onToast) onToast('Photo supprimée');
  };

  // Helpers composite (pn, pne)
  const compVal = (typeof value === 'object' && value !== null && !Array.isArray(value)) ? value : {};
  const setComp = (patch) => onSetVal({ ...compVal, ...patch });

  const photoCount = photos.length;

  return (
    <div style={{
      borderLeft: `3px solid ${filled ? 'var(--green-soft)' : 'var(--border)'}`,
      paddingLeft: 12, paddingTop: 6, paddingBottom: 6,
      transition: 'border-color 0.2s',
      opacity: locked ? 0.55 : 1,
      pointerEvents: locked ? 'none' : 'auto',
      position: 'relative'
    }}>
      {/* HEADER : label + tag + clear */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.3 }}>{c.label}</div>
          {c.help && <div style={{ fontSize: 11.5, color: 'var(--taupe)', fontStyle: 'italic', marginTop: 2 }}>{c.help}</div>}
        </div>
        <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexShrink: 0 }}>
          {c.tag &&
          <span style={{
            fontSize: 8.5, fontWeight: 700, padding: '2px 5px', borderRadius: 1,
            letterSpacing: '0.08em', textTransform: 'uppercase',
            background: c.tag === 'amont' ? 'var(--paper-shade)' : 'var(--bureau-bg)',
            color: c.tag === 'amont' ? 'var(--ink-soft)' : 'var(--bureau)',
            border: `1px solid ${c.tag === 'amont' ? 'var(--taupe-light)' : 'var(--bureau)'}`
          }}>{c.tag}</span>
          }
          {filled && !locked &&
          <button onClick={onClear} title="Effacer" style={{
            fontSize: 10, color: 'var(--taupe)', padding: '2px 5px', opacity: 0.7
          }}>↺</button>
          }
        </div>
      </div>

      {/* PHOTO-FIRST : gros bouton photo en haut, à droite des inputs */}
      {!locked && c.type !== 'subhead' &&
      <div style={{
        marginBottom: 10,
        display: 'flex', gap: 8, alignItems: 'stretch'
      }}>
        <input type="file" accept="image/*" capture="environment" multiple ref={cameraInputRef}
          onChange={handleFileChange} style={{ display: 'none' }} />
        <input type="file" accept="image/*" multiple ref={galleryInputRef}
          onChange={handleFileChange} style={{ display: 'none' }} />
        <button onClick={() => cameraInputRef.current?.click()} disabled={uploading} style={{
          flex: 1, padding: '10px 12px',
          background: photoCount > 0 ? 'var(--ink)' : 'var(--paper)',
          color: photoCount > 0 ? 'var(--paper-light)' : 'var(--ink)',
          border: photoCount > 0 ? '1.5px solid var(--ink)' : '1.5px dashed var(--taupe-light)',
          borderRadius: 4,
          fontSize: 12, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          opacity: uploading ? 0.6 : 1, transition: 'all .15s'
        }}>
          <svg width="16" height="16" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="3" width="12" height="9" rx="1" stroke="currentColor" strokeWidth="1.4" />
            <circle cx="7" cy="7.5" r="2.4" stroke="currentColor" strokeWidth="1.4" fill="none" />
            <rect x="5" y="2" width="4" height="2" rx="0.5" stroke="currentColor" strokeWidth="1.4" />
          </svg>
          {uploading ? 'Envoi…' : (photoCount > 0 ? `${photoCount} photo${photoCount>1?'s':''}` : 'Prendre une photo')}
        </button>
        <button onClick={() => galleryInputRef.current?.click()} disabled={uploading}
          title="Ajouter depuis la galerie"
          style={{
            padding: '10px 12px', minWidth: 44,
            border: '1.5px dashed var(--taupe-light)', borderRadius: 4,
            background: 'var(--paper-light)', color: 'var(--taupe)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            opacity: uploading ? 0.6 : 1
          }}>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="1" stroke="currentColor" strokeWidth="1.2" />
            <path d="M2 9 L5 6 L8 8 L11 5 L12 6.5" stroke="currentColor" strokeWidth="1.2" fill="none" />
          </svg>
        </button>
      </div>
      }

      {/* PHOTOS PREVIEW (juste sous le bouton si présentes) */}
      {photoCount > 0 &&
      <div style={{
        marginBottom: 10, display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(72px, 1fr))', gap: 6
      }}>
        {photos.map((p, i) => (
          <div key={i} style={{
            position: 'relative', aspectRatio: '1', borderRadius: 2, overflow: 'hidden',
            border: '1px solid var(--border)', background: 'var(--paper)', cursor: 'pointer'
          }} onClick={() => openLightbox(p.url)}>
            <img src={p.url} alt="" loading="lazy"
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
            {!locked && <button onClick={(e) => { e.stopPropagation(); removePhotoAt(i); }} style={{
              position: 'absolute', top: 2, right: 2,
              width: 20, height: 20, borderRadius: '50%',
              background: 'rgba(26,26,26,0.7)', color: 'var(--paper)',
              fontSize: 12, fontWeight: 'bold', lineHeight: 1,
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>×</button>}
          </div>
        ))}
      </div>
      }

      {/* INPUTS — selon type */}
      {c.type === 'yesno' && <YesNo value={value} onSet={onSetVal} />}
      {c.type === 'presence' && <Presence value={value} onSet={onSetVal} />}
      {c.type === 'rating' && <RatingFixed c={c} value={value} onSet={onSetVal} />}
      {c.type === 'count' && <CountInput value={value} onSet={onSetVal} />}
      {c.type === 'choice' && <ChoiceSelect c={c} value={value} onSet={onSetVal} />}
      {c.type === 'multi' && <MultiSelect c={c} value={value} onSet={onSetVal} />}
      {c.type === 'number' && <NumberInput value={value} onSet={onSetVal} />}
      {c.type === 'pn' &&
        <CompositePN value={compVal} onSet={setComp} />
      }
      {c.type === 'pne' &&
        <CompositePNE value={compVal} onSet={setComp} />
      }

      {/* NOTE — repliable */}
      <button onClick={() => setShowExtras((s) => !s)} style={{
        marginTop: 8, fontSize: 11, color: hasExtras ? 'var(--ink)' : 'var(--taupe)',
        display: 'inline-flex', alignItems: 'center', gap: 5, padding: '2px 0',
        fontWeight: hasExtras ? 600 : 400
      }}>
        {showExtras ? '−' : '+'} note libre
        {note && <span style={{ fontSize: 10, color: 'var(--taupe)' }}>· {note.length>30 ? note.slice(0,30)+'…' : note}</span>}
      </button>
      {showExtras && !locked &&
      <div style={{ marginTop: 6 }}>
        <textarea placeholder="Précision, contexte ou observation libre…" rows={2}
          value={note}
          onChange={(e) => onSetNote(e.target.value)}
          style={{
            width: '100%', padding: '8px 10px', fontSize: 12.5, fontFamily: 'inherit',
            border: '1px solid var(--border)', borderRadius: 2, background: 'var(--paper-light)',
            resize: 'vertical', outline: 'none', minHeight: 48, lineHeight: 1.4
          }} />
      </div>
      }
    </div>);

}

/* ============================================================
   COMPOSITE INPUTS — multi + pn + pne
   ============================================================ */
function MultiSelect({ c, value, onSet }) {
  const sel = Array.isArray(value) ? value : [];
  const toggle = (ch) => {
    if (sel.includes(ch)) onSet(sel.filter(x => x !== ch));
    else onSet([...sel, ch]);
  };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
      {c.choices.map((ch) => {
        const active = sel.includes(ch);
        return (
          <button key={ch} onClick={() => toggle(ch)} style={{
            padding: '11px 14px', textAlign: 'left',
            border: `1.5px solid ${active ? 'var(--ink)' : 'var(--border)'}`,
            background: active ? 'var(--ink)' : 'var(--white)',
            color: active ? 'var(--paper-light)' : 'var(--ink-soft)',
            borderRadius: 4, fontSize: 13, fontWeight: active ? 600 : 500,
            display: 'flex', alignItems: 'center', gap: 11,
            transition: 'all .15s'
          }}>
            <span style={{
              width: 16, height: 16, borderRadius: 3,
              border: `1.5px solid ${active ? 'var(--paper-light)' : 'var(--taupe-light)'}`,
              background: active ? 'var(--paper-light)' : 'transparent',
              flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: 'var(--ink)', fontSize: 11, fontWeight: 700
            }}>{active && '✓'}</span>
            {ch}
          </button>);
      })}
    </div>);
}

function CompositePN({ value, onSet }) {
  // value: { presence: 'yes'|'no', nb: N }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <Presence value={value.presence} onSet={(v) => onSet({ presence: v, nb: v === 'no' ? 0 : value.nb })} />
      {value.presence === 'yes' &&
        <div>
          <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
            textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>Combien ?</div>
          <CountInput value={value.nb} onSet={(v) => onSet({ presence: 'yes', nb: v })} />
        </div>
      }
    </div>);
}

function CompositePNE({ value, onSet }) {
  // value: { presence: 'yes'|'no', nb: N, etat: 0..1 (rating sur 4) }
  const etatLabels = ['Mauvais', 'Moyen', 'Bon', 'Très bon'];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      <Presence value={value.presence} onSet={(v) => onSet({ presence: v, nb: v === 'no' ? 0 : value.nb, etat: v === 'no' ? undefined : value.etat })} />
      {value.presence === 'yes' &&
        <>
          <div>
            <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
              textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>Combien ?</div>
            <CountInput value={value.nb} onSet={(v) => onSet({ ...value, presence: 'yes', nb: v })} />
          </div>
          <div>
            <div style={{ fontSize: 11, color: 'var(--taupe)', letterSpacing: '0.06em',
              textTransform: 'uppercase', fontWeight: 600, marginBottom: 4 }}>État général</div>
            <RatingFixed c={{ scale: 4, labels: etatLabels }}
              value={value.etat}
              onSet={(v) => onSet({ ...value, presence: 'yes', etat: v })} />
          </div>
        </>
      }
    </div>);
}

/* Lightbox simple — rendu côté DOM en dehors de React */
function openLightbox(url) {
  let el = document.getElementById('lightbox-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'lightbox-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;cursor:pointer;';
    el.onclick = () => el.remove();
    document.body.appendChild(el);
  }

function RatingFixed({ c, value, onSet }) {
  const n = c.scale;
  let vals;
  if (n === 2) vals = [0, 1];else
  if (n === 3) vals = [0, 0.5, 1];else
  if (n === 4) vals = [0, 0.33, 0.66, 1];else
  vals = [0, 0.5, 1];

  const colorFor = (v) => {
    if (v === 0) return { solid: 'var(--red)', shadow: 'var(--red-dark)', dot: 'var(--red)' };
    if (v < 0.55) return { solid: 'var(--amber)', shadow: '#8E5500', dot: 'var(--amber)' };
    if (v < 0.85) return { solid: 'var(--green-soft)', shadow: 'var(--green)', dot: 'var(--green-soft)' };
    return { solid: 'var(--green)', shadow: '#0F4226', dot: 'var(--green)' };
  };

  return (
    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${n}, 1fr)`, gap: 6 }}>
      {vals.map((v, i) => {
        const active = value === v;
        const col = colorFor(v);
        return (
          <button key={v} onClick={() => onSet(v)} style={{
            padding: '12px 4px', border: `1.5px solid ${active ? col.solid : 'var(--border)'}`,
            background: active ? col.solid : 'var(--white)',
            color: active ? 'var(--paper-light)' : 'var(--ink-soft)',
            borderRadius: 4, fontSize: 11.5, fontWeight: active ? 600 : 500,
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
            minHeight: 60, lineHeight: 1.15,
            transition: 'transform .12s ease, background .15s, color .15s, border-color .15s, box-shadow .15s',
            textAlign: 'center',
            transform: active ? 'translateY(-1px)' : 'translateY(0)',
            boxShadow: active ? `0 2px 0 ${col.shadow}, 0 5px 12px -4px ${col.solid}` : 'none'
          }}>
            <span style={{
              width: 10, height: 10, borderRadius: '50%',
              background: active ? 'var(--paper-light)' : col.dot,

            <span>{c.labels[i]}</span>
          </button>);

      })}
    </div>);

}

/* ============================================================

   ============================================================ */
function OverviewScreen({ gare, visite, onBack, onZone, onExport }) {
  const sections = SECTIONS.filter((s) => !s.skipIf || !s.skipIf(gare, visite.data));
  const stats = visiteStats(gare, visite.data);
  const missing = sections.flatMap((s) => {
    const items = fillableCriteria(s);
    return items.filter((c) => !isFilled(c, visite.data?.[c.id])).map((c) => ({ s, c }));
  });

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '12px 18px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 13 }}>← Retour saisie</button>
        <div className="kicker" style={{ fontSize: 10 }}>Vue d'ensemble</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 20px 40px' }}>
        <Kicker color="var(--ink)">Carnet · {gare.nom}</Kicker>
        <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em', marginBottom: 6 }}>
          {stats.pct === 100 ? 'Visite complète.' : `Visite en cours · ${stats.pct}%`}
        </h2>
        <div style={{ height: 3, width: 30, background: 'var(--red)', marginBottom: 18 }} />

        {/* Section breakdown */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>Décomposition par zone</div>
        <div style={{ background: 'var(--white)', border: '1px solid var(--border)' }}>
          {sections.map((s, i) => {
            const st = sectionStats(s, visite.data);
            const done = st.filled === st.total && st.total > 0;
            const pct = st.total === 0 ? 0 : Math.round(st.filled / st.total * 100);
            return (
              <button key={s.id} onClick={() => onZone(s.id)} style={{
                width: '100%', padding: '12px 14px', textAlign: 'left',
                borderBottom: i === sections.length - 1 ? 'none' : '1px solid var(--border-soft)',
                display: 'flex', alignItems: 'center', gap: 12
              }}>
                <span className="tabular" style={{
                  width: 24, height: 24, borderRadius: '50%',
                  background: done ? 'var(--green)' : st.filled > 0 ? 'var(--red)' : 'var(--paper-deep)',
                  color: st.filled > 0 ? 'var(--paper-light)' : 'var(--taupe)',
                  fontSize: 10.5, fontWeight: 700,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0
                }}>{done ? '✓' : s.n}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 500 }}>{s.title}</div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginTop: 5 }}>
                    <div style={{ flex: 1, height: 3, background: 'var(--paper-deep)', borderRadius: 1, overflow: 'hidden', maxWidth: 120 }}>
                      <div style={{ height: '100%', width: `${pct}%`, background: done ? 'var(--green)' : 'var(--red)' }} />
                    </div>
                    <span className="tabular" style={{ fontSize: 10.5, color: 'var(--taupe)', fontWeight: 600 }}>
                      {st.filled}/{st.total}
                    </span>
                  </div>
                </div>
              </button>);

          })}
        </div>

        {/* Missing items */}
        {missing.length > 0 &&
        <>
            <div className="kicker" style={{ color: 'var(--red)', fontSize: 10, marginTop: 22, marginBottom: 10,
            display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ width: 18, height: 1.5, background: 'var(--red)' }} />
              Encore à relever · {missing.length}
            </div>
            <div style={{ background: 'var(--white)', border: '1px solid var(--border)',
            padding: '10px 14px', maxHeight: 180, overflowY: 'auto' }}>
              {missing.slice(0, 12).map(({ s, c }, i) =>
            <button key={c.id} onClick={() => onZone(s.id)} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '7px 0', borderBottom: i === Math.min(missing.length, 12) - 1 ? 'none' : '1px dotted var(--border-soft)',
              fontSize: 12.5
            }}>
                  <span style={{ color: 'var(--taupe)', fontSize: 9.5, letterSpacing: '0.06em',
                textTransform: 'uppercase', marginRight: 8 }}>{s.short}</span>
                  {c.label}
                </button>
            )}
              {missing.length > 12 &&
            <div style={{ fontSize: 11, color: 'var(--taupe)', fontStyle: 'italic', textAlign: 'center', padding: '8px 0 0' }}>
                  + {missing.length - 12} autres…
                </div>
            }
            </div>
          </>
        }

        {stats.pct === 100 &&
        <div style={{ marginTop: 22, background: 'var(--white)', border: '2px solid var(--green)',
          padding: '18px 16px', textAlign: 'center' }}>
            <Stamp color="var(--green)">Visite validée</Stamp>
            <div style={{ fontSize: 13, color: 'var(--ink-soft)', marginTop: 10, lineHeight: 1.5 }}>
              Tous les critères sont relevés. Tu peux exporter le carnet vers la base SERM.
            </div>
          </div>
        }

        <button onClick={onExport} style={{
          marginTop: 22, width: '100%', padding: '15px', background: 'var(--red)', color: 'var(--paper-light)',
          fontWeight: 600, fontSize: 14, letterSpacing: '0.04em', textTransform: 'uppercase',
          borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
        }}>
          ⇣ Exporter ce carnet (CSV)
        </button>
      </div>
    </div>);

}

/* ============================================================
   EXPORT SCREEN — choix scope (toutes / cette gare / sélection) × format (CSV / Excel / JSON)
   ============================================================ */
function ExportScreen({ all, onBack, onExport }) {
  const visitesAll = Object.values(all).sort((a, b) => b.updated - a.updated);
  const [scope, setScope] = useState('all'); // 'all' | 'select' | 'completed' | 'in_progress'
  const [format, setFormat] = useState('xlsx'); // 'xlsx' | 'csv' | 'json'
  const [selected, setSelected] = useState(() => new Set());

  const toggleSelect = (gareName) => {
    setSelected((s) => {
      const next = new Set(s);
      if (next.has(gareName)) next.delete(gareName); else next.add(gareName);
      return next;
    });
  };

  const visitesToExport = useMemo(() => {
    if (scope === 'all') return visitesAll;
    if (scope === 'select') return visitesAll.filter((v) => selected.has(v.gare));
    if (scope === 'completed') return visitesAll.filter((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      return g && visiteStats(g, v.data).pct === 100;
    });
    if (scope === 'in_progress') return visitesAll.filter((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      return g && visiteStats(g, v.data).pct > 0 && visiteStats(g, v.data).pct < 100;
    });
    return visitesAll;
  }, [scope, selected, visitesAll]);

  const handleExport = () => {
    const baseName = scope === 'select' && selected.size === 1
      ? `releve_${[...selected][0]}`
      : scope === 'completed' ? 'releve_SERM_Touraine_validees'
      : scope === 'in_progress' ? 'releve_SERM_Touraine_en_cours'
      : 'releve_SERM_Touraine_toutes';
    onExport(visitesToExport, format, baseName);
  };

  const formats = [
    { v: 'xlsx', label: 'Excel', sub: '.xlsx — recommandé', icon: '📊' },
    { v: 'csv',  label: 'CSV',   sub: '.csv — séparateur ;', icon: '📄' },
    { v: 'json', label: 'JSON',  sub: '.json — backup / réimport', icon: '⌥' }
  ];
  const scopes = [
    { v: 'all',         label: `Toutes les visites`, count: visitesAll.length },
    { v: 'completed',   label: `Validées (100%)`, count: visitesAll.filter((v) => { const g = GARES.find((x) => x.nom === v.gare); return g && visiteStats(g, v.data).pct === 100; }).length },
    { v: 'in_progress', label: `En cours`, count: visitesAll.filter((v) => { const g = GARES.find((x) => x.nom === v.gare); return g && visiteStats(g, v.data).pct > 0 && visiteStats(g, v.data).pct < 100; }).length },
    { v: 'select',      label: `Sélection manuelle`, count: selected.size }
  ];

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--paper-light)', minHeight: 0 }}>
      <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '14px 20px',
        display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
        <button onClick={onBack} style={{ color: 'var(--paper)', fontSize: 14 }}>← Carnet</button>
        <div className="kicker" style={{ fontSize: 10.5, letterSpacing: '0.18em' }}>Exporter</div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: '22px 20px 40px' }}>
        <Kicker color="var(--ink)">Carnet · Export</Kicker>
        <h2 style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.025em', marginBottom: 6 }}>
          {visitesAll.length === 0 ? 'Aucune visite à exporter' : `${visitesAll.length} visite${visitesAll.length > 1 ? 's' : ''} disponibles`}
        </h2>
        <div style={{ height: 3, width: 30, background: 'var(--red)', marginBottom: 22 }} />

        {/* Scope */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>1 — Que veux-tu exporter ?</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 22 }}>
          {scopes.map((s) => (
            <button key={s.v} onClick={() => setScope(s.v)} disabled={s.count === 0 && s.v !== 'select'} style={{
              padding: '13px 14px', textAlign: 'left',
              border: `1.5px solid ${scope === s.v ? 'var(--ink)' : 'var(--border)'}`,
              background: scope === s.v ? 'var(--ink)' : 'var(--white)',
              color: scope === s.v ? 'var(--paper-light)' : 'var(--ink)',
              borderRadius: 2, fontSize: 13.5,
              display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10,
              opacity: (s.count === 0 && s.v !== 'select') ? 0.4 : 1
            }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{
                  width: 16, height: 16, borderRadius: '50%',
                  border: `1.5px solid ${scope === s.v ? 'var(--paper-light)' : 'var(--border)'}`,
                  background: scope === s.v ? 'var(--paper-light)' : 'transparent',
                  position: 'relative', flexShrink: 0
                }}>
                  {scope === s.v && <span style={{ position: 'absolute', inset: 3, borderRadius: '50%', background: 'var(--ink)' }} />}
                </span>
                {s.label}
              </span>
              <span className="tabular" style={{
                fontSize: 11, fontWeight: 600,
                color: scope === s.v ? 'var(--paper-light)' : 'var(--taupe)'
              }}>{s.count}</span>
            </button>
          ))}
        </div>

        {/* If select scope, show list to pick */}

          <div style={{ marginBottom: 22 }}>
            <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 8 }}>
              Sélectionne les gares · {selected.size} choisie{selected.size > 1 ? 's' : ''}

                const g = GARES.find((x) => x.nom === v.gare);

                  <button key={v.gare} onClick={() => toggleSelect(v.gare)} style={{
                    width: '100%', padding: '10px 14px', textAlign: 'left',

                  }}>
                    <span style={{
                      width: 16, height: 16, borderRadius: 3,
                      border: `1.5px solid ${isSel ? 'var(--red)' : 'var(--border)'}`,
                      background: isSel ? 'var(--red)' : 'transparent',
                      flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: 'var(--paper-light)', fontSize: 11, fontWeight: 700
                    }}>{isSel && '✓'}</span>
                    <span style={{ flex: 1, fontSize: 13 }}>{v.gare}</span>
                    <span className="tabular" style={{ fontSize: 11, color: 'var(--taupe)' }}>{stats.pct}%</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Format */}
        <div className="kicker" style={{ color: 'var(--taupe)', fontSize: 10, marginBottom: 10 }}>2 — Format</div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 26 }}>
          {formats.map((f) => (
            <button key={f.v} onClick={() => setFormat(f.v)} style={{
              padding: '13px 14px', textAlign: 'left',
              border: `1.5px solid ${format === f.v ? 'var(--ink)' : 'var(--border)'}`,
              background: format === f.v ? 'var(--ink)' : 'var(--white)',
              color: format === f.v ? 'var(--paper-light)' : 'var(--ink)',
              borderRadius: 2,
              display: 'flex', alignItems: 'center', gap: 12
            }}>
              <span style={{
                width: 16, height: 16, borderRadius: '50%',
                border: `1.5px solid ${format === f.v ? 'var(--paper-light)' : 'var(--border)'}`,
                background: format === f.v ? 'var(--paper-light)' : 'transparent',
                position: 'relative', flexShrink: 0
              }}>
                {format === f.v && <span style={{ position: 'absolute', inset: 3, borderRadius: '50%', background: 'var(--ink)' }} />}
              </span>
              <span style={{ fontSize: 17 }}>{f.icon}</span>
              <span style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{f.label}</div>
                <div style={{ fontSize: 11, opacity: 0.7, marginTop: 2 }}>{f.sub}</div>
              </span>
            </button>
          ))}
        </div>

        {/* Photos info */}
        <div style={{
          background: 'var(--paper-deep)', border: '1px solid var(--border)',
          padding: '10px 12px', fontSize: 11.5, color: 'var(--ink-soft)', marginBottom: 22,
          lineHeight: 1.5
        }}>
          ℹ Les photos sont incluses sous forme de liens (URL Supabase) dans la colonne dédiée.
          Pour intégrer les images directement dans Excel, télécharge l'export, puis utilise <strong>Insertion → Image depuis URL</strong>.
        </div>

        <button onClick={handleExport} disabled={visitesToExport.length === 0} style={{
          width: '100%', padding: '15px', background: 'var(--red)', color: 'var(--paper-light)',
          fontWeight: 600, fontSize: 14, letterSpacing: '0.04em', textTransform: 'uppercase',
          borderRadius: 2, opacity: visitesToExport.length === 0 ? 0.4 : 1,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8
        }}>
          ⇣ Exporter {visitesToExport.length} visite{visitesToExport.length > 1 ? 's' : ''}
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [route, setRoute] = useState({ name: 'home' });
  const [all, setAll] = useState(loadAll());
  const [auteur, setAuteur] = useState(localStorage.getItem('serm-auteur') || 'Anonyme');
  const [toast, setToast] = useState(null);
  const [syncing, setSyncing] = useState(false);

  // Initial pull from Supabase + local persistence
  useEffect(() => {
    let mounted = true;
    setSyncing(true);
    pullAllFromSupa().then((fresh) => {
      if (mounted && fresh) setAll(fresh);
      setSyncing(false);
    });
    return () => { mounted = false; };
  }, []);

  // Real-time sync : refresh when teammates push changes
  useEffect(() => {
    const teardown = setupRealtimeSync((fresh) => setAll(fresh));
    return teardown;
  }, []);

  // Persist locally
  useEffect(() => { saveAll(all); }, [all]);

  // First-time author prompt
  useEffect(() => {
    if (auteur === 'Anonyme' && !localStorage.getItem('serm-auteur')) {
      const n = (prompt("Bienvenue ! Quel est ton prénom ou tes initiales ? (pour identifier tes relevés dans l'équipe)") || '').trim();
      if (n) {
        setAuteur(n);
        localStorage.setItem('serm-auteur', n);
      }
    }
    // eslint-disable-next-line
  }, []);

  const showToast = (msg, type = '') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2200);
  };

  const startVisite = (gareName) => {
    const g = GARES.find((x) => x.nom === gareName);
    if (!all[gareName]) {
      // Pré-remplir avec les attributs connus de la gare (Caractérisation + Synthèse)
      const initialData = {
        carac_quais_nb_acc: g.quais,
        // (typologie Touraine à choisir manuellement — pas de mapping auto cat_pro → choices)
      };
      const newV = { gare: gareName, data: initialData, updated: Date.now(), auteur };
      setAll((a) => ({ ...a, [gareName]: newV }));
      pushVisiteToSupa(newV);
    }
    setRoute({ name: 'form', gareName });
  };

  const updateVisite = (v) => {
    // Le dernier modificateur devient l'auteur affiché
    const updated = { ...v, auteur: auteur };
    setAll((a) => ({ ...a, [v.gare]: updated }));
    pushVisiteToSupa(updated);
  };

  const deleteVisite = async (gareName) => {
    if (!confirm(`Supprimer la visite de ${gareName} ? Cette action est irréversible.`)) return;
    setAll((a) => { const next = { ...a }; delete next[gareName]; return next; });
    await deleteVisiteRemote(gareName);
    showToast('Visite supprimée');
    setRoute({ name: 'home' });
  };

  const changeAuteur = () => {
    const n = (prompt('Ton prénom ou tes initiales ?', auteur) || '').trim();
    if (n) {
      setAuteur(n);
      localStorage.setItem('serm-auteur', n);
    }
  };

  /* ===== EXPORT — multi-format (CSV / Excel / JSON) avec choix de scope ===== */
  const csvEscape = (v) => {
    if (v == null) return '';
    const s = String(v);
    return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  /* Construit un tableau 2D : [headers, ...rows] à partir d'une liste de visites */
  const buildTable = (visites) => {
    const headerMeta = ['gare', 'typologie', 'cat_pro', 'cat_sgp', 'ligne_flux', 'axe', 'secteur', 'auteur', 'updated', 'progression_pct'];
    const headerCrit = [];
    SECTIONS.forEach((s) => {
      (s.criteria || []).forEach((c) => {
        if (c.type === 'subhead') return; // séparateurs visuels — exclus de l'export
        headerCrit.push(`${s.id}__${c.id}__val`);
        headerCrit.push(`${s.id}__${c.id}__note`);
        headerCrit.push(`${s.id}__${c.id}__photos`);
      });
    });
    const headers = [...headerMeta, ...headerCrit];
    const rows = [];
    visites.forEach((v) => {
      const g = GARES.find((x) => x.nom === v.gare);
      const stats = g ? visiteStats(g, v.data) : { pct: 0 };
      const row = [
        v.gare,
        g ? getTypologie(g) : '',
        g?.cat_pro || '', g?.cat_sgp || '', g?.ligne_flux || '', g?.axe || '', g?.secteur || '',
        v.auteur || '',
        new Date(v.updated || Date.now()).toISOString(),
        stats.pct
      ];
      SECTIONS.forEach((s) => {
        (s.criteria || []).forEach((c) => {
          if (c.type === 'subhead') return;
          const d = v.data?.[c.id];
          let val = '', note = '', photos = '';
          if (Array.isArray(d)) {
            // multi-select : on joint les choix par " | "
            val = d.join(' | ');
          } else if (d != null && typeof d === 'object') {
            note = d.note || '';
            photos = (d.photos || []).map((p) => p.url || '').join(' | ');
            // Composite (pn/pne) : on sérialise presence + nb [+ etat]
            if ('presence' in d && !('val' in d)) {
              const parts = [d.presence === 'yes' ? 'présent' : d.presence === 'no' ? 'absent' : ''];
              if (d.nb != null && d.nb !== '' && d.presence === 'yes') parts.push(`nb=${d.nb}`);
              if (d.etat != null && d.presence === 'yes') {
                const labels = ['Mauvais', 'Moyen', 'Bon', 'Très bon'];
                const idx = [0, 0.33, 0.66, 1].indexOf(d.etat);
                parts.push(`état=${idx >= 0 ? labels[idx] : d.etat}`);
              }
              val = parts.filter(Boolean).join(' / ');
            } else if ('val' in d) {
              const inner = d.val;
              val = Array.isArray(inner) ? inner.join(' | ') : (inner != null ? inner : '');
            }
          } else {
            val = d != null ? d : '';
          }
          row.push(val); row.push(note); row.push(photos);
        });
      });
      rows.push(row);
    });
    return { headers, rows };
  };
  const downloadBlob = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
  };
  const exportData = (visites, format, baseName) => {
    if (visites.length === 0) { showToast('Aucune visite à exporter', 'error'); return; }
    const today = new Date().toISOString().slice(0, 10);
    const safeName = baseName.replace(/[^a-z0-9_-]/gi, '_');
    if (format === 'csv') {
      const { headers, rows } = buildTable(visites);
      const csv = '\uFEFF' + [headers, ...rows].map((r) => r.map(csvEscape).join(';')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      downloadBlob(blob, `${safeName}_${today}.csv`);
    } else if (format === 'xlsx') {
      if (!window.XLSX) { showToast('Excel non chargé — réessaie', 'error'); return; }
      const { headers, rows } = buildTable(visites);
      const ws = window.XLSX.utils.aoa_to_sheet([headers, ...rows]);
      // Fige la première ligne
      ws['!freeze'] = { xSplit: 0, ySplit: 1 };
      // Largeur auto approximative
      ws['!cols'] = headers.map((h) => ({ wch: Math.max(10, Math.min(40, h.length + 4)) }));
      const wb = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(wb, ws, 'Relevés SERM Touraine');
      window.XLSX.writeFile(wb, `${safeName}_${today}.xlsx`);
    } else if (format === 'json') {
      const payload = {
        exported_at: new Date().toISOString(),
        exported_by: auteur,
        n_visites: visites.length,
        visites: visites.map((v) => ({
          gare: v.gare,
          gare_info: GARES.find((g) => g.nom === v.gare) || null,
          typologie: (() => { const g = GARES.find((x) => x.nom === v.gare); return g ? getTypologie(g) : null; })(),
          auteur: v.auteur || null,
          updated: v.updated || null,
          data: v.data || {}
        }))
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      downloadBlob(blob, `${safeName}_${today}.json`);
    }
    showToast(`${visites.length} visite${visites.length > 1 ? 's' : ''} exportée${visites.length > 1 ? 's' : ''} ✓`, 'success');
  };

  if (route.name === 'home') {
    return <>
      <HomeScreen all={all} auteur={auteur} syncing={syncing}
        onPick={() => setRoute({ name: 'picker' })}
        onOpen={(g) => setRoute({ name: 'form', gareName: g })}
        onChangeAuteur={changeAuteur}
        onExportAll={() => setRoute({ name: 'export' })} />
      <Toast toast={toast} />
    </>;
  }
  if (route.name === 'picker') {
    return <PickerScreen all={all} onBack={() => setRoute({ name: 'home' })} onPick={startVisite} />;
  }
  if (route.name === 'export') {
    return <>
      <ExportScreen all={all}
        onBack={() => setRoute({ name: 'home' })}
        onExport={(visites, format, name) => exportData(visites, format, name)} />
      <Toast toast={toast} />
    </>;
  }
  if (route.name === 'form') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <FormScreen gare={g} visite={v} onUpdate={updateVisite}
        onBack={() => setRoute({ name: 'home' })}
        onOverview={() => setRoute({ name: 'overview', gareName: g.nom })}
        onDelete={() => deleteVisite(g.nom)}
        onToast={showToast} />
      <Toast toast={toast} />
    </>;
  }
  if (route.name === 'overview') {
    const g = GARES.find((x) => x.nom === route.gareName);
    const v = all[route.gareName];
    if (!g || !v) { setTimeout(() => setRoute({ name: 'home' })); return null; }
    return <>
      <OverviewScreen gare={g} visite={v}
        onBack={() => setRoute({ name: 'form', gareName: g.nom })}
        onZone={(id) => setRoute({ name: 'form', gareName: g.nom, jumpTo: id })}
        onExport={() => exportData([v], 'xlsx', `releve_${g.nom}`)} />
      <Toast toast={toast} />
    </>;
  }
  return null;
}

function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div style={{
      position: 'fixed', bottom: 30, left: '50%', transform: 'translateX(-50%)',
      background: toast.type === 'success' ? 'var(--green)' : toast.type === 'error' ? 'var(--red)' : 'var(--ink)',
      color: 'var(--paper-light)', padding: '10px 18px',
      fontSize: 13, fontWeight: 500, borderRadius: 2, boxShadow: 'var(--shadow-lg)',
      zIndex: 1000, letterSpacing: '0.02em', maxWidth: '80vw'
    }}>{toast.msg}</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
