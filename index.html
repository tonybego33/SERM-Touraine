/* ============================================================
   TYPOLOGIE DE GARE — d'après plan de voies (réf. Beuret)
   https://beuret.net/typologie-des-gares/
   Adapté au contexte SERM Touraine (réseau TER existant, urbain/périurbain)
   ============================================================ */
const TYPOLOGIES = [
  'Halte simple (1 voie, 1 quai)',
  'Halte double (2 voies, 2 quais latéraux)',
  'Halte centrale (1 quai entre 2 voies)',
  'Halte avec PN (quais reliés par passage à niveau)',
  'Gare de croisement (avec BV)',
  'Gare de bifurcation',
  'PEM de centralité',
  'Gare terminus / cul-de-sac'
];

/* Déduit la typologie depuis cat_sgp / config / quais / nom */
const getTypologie = (gare) => {
  if (!gare) return TYPOLOGIES[1];
  if (gare.cat_sgp === 'PEM de centralité') return 'PEM de centralité';
  if (gare.config === 'unilaterale' || gare.quais === 1) return 'Halte simple (1 voie, 1 quai)';
  if (gare.quais === 2) return 'Halte double (2 voies, 2 quais latéraux)';
  if (gare.quais === 3) return 'Gare de croisement (avec BV)';
  if (gare.quais >= 4) return 'Gare de bifurcation';
  return 'Halte double (2 voies, 2 quais latéraux)';
};

const KEY = 'serm-touraine-v1:visites';
const loadAll = () => { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } };
const saveAll = (all) => { try { localStorage.setItem(KEY, JSON.stringify(all)); } catch (e) {} };

/* Push one visite to Supabase (silent, non-blocking) */
async function pushVisiteToSupa(v) {
  if (!supa) return;
  try {
    const { error } = await supa.from(SUPA_TABLE).upsert({
      gare: v.gare,
      data: v.data || {},
      meta: { updated: v.updated, auteur: v.auteur },
      gare_info: {},
      auteur: v.auteur || 'Anonyme',
      updated_at: new Date(v.updated || Date.now()).toISOString()
    });
    if (error) console.warn('Supabase upsert:', error);
  } catch (e) { console.warn('Push failed:', e); }
}

/* Pull all visites from Supabase, merge into local state */
async function pullAllFromSupa() {
  if (!supa) return null;
  try {
    const { data, error } = await supa.from(SUPA_TABLE).select('*');
    if (error || !data) { console.warn('Supabase pull:', error); return null; }
    const all = {};
    data.forEach(row => {
      all[row.gare] = {
        gare: row.gare,
        data: row.data || {},
        updated: row.meta?.updated || new Date(row.updated_at).getTime(),
        auteur: row.auteur || row.meta?.auteur || 'Anonyme'
      };
    });
    saveAll(all);
    return all;
  } catch (e) { console.warn('Pull failed:', e); return null; }
}

/* Delete one visite (Supabase + local) */
async function deleteVisiteRemote(gareName) {
  try { const all = loadAll(); delete all[gareName]; saveAll(all); } catch (e) {}
  if (!supa) return;
  try { await supa.from(SUPA_TABLE).delete().eq('gare', gareName); }
  catch (e) { console.warn('Delete failed:', e); }
}

/* Real-time sync : refresh app state when teammates change data */
function setupRealtimeSync(onChange) {
  if (!supa) return () => {};
  try {
    const channel = supa.channel('visites_touraine_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: SUPA_TABLE }, async () => {
        const fresh = await pullAllFromSupa();
        if (fresh) onChange(fresh);
      })
      .subscribe();
    return () => { try { supa.removeChannel(channel); } catch (e) {} };
  } catch (e) { console.warn('Realtime setup failed:', e); return () => {}; }
}

/* Photo upload to Supabase Storage */
async function uploadPhoto(gareName, critId, file) {
  if (!supa) {
    // Fallback : data URL local
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve({ url: r.result, name: file.name, local: true });
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }
  const ts = Date.now();
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').slice(-40);
  const slug = gareName.replace(/[^a-zA-Z0-9]/g, '_');
  const path = `${slug}/${critId}_${ts}_${safe}`;
  const { error } = await supa.storage.from('photos').upload(path, file, { contentType: file.type, upsert: false });
  if (error) throw error;
  const { data } = supa.storage.from('photos').getPublicUrl(path);
  return { url: data.publicUrl, path, name: file.name };
}

async function deletePhoto(photo) {
  if (photo?.path && supa) {
    try { await supa.storage.from('photos').remove([photo.path]); } catch (e) { console.warn(e); }
  }
}

/* ============================================================
   HELPERS
   ============================================================ */
/* fillableCriteria — exclut text + subhead (séparateurs visuels) */
const fillableCriteria = (s) => (s.criteria || []).filter((c) => c.type !== 'text' && c.type !== 'subhead');
/* Get the actual "val" of a criterion, handling 4 shapes:
   - primitive : data[id] = 'yes' | 0.5 | 12 | 'Quai haut'
   - array (multi-select) : data[id] = ['choix_a', 'choix_b']
   - composite pn/pne : data[id] = { presence, nb, etat, note?, photos? }
   - wrapper avec extras : data[id] = { val: <primitive|array>, note, photos } */
const getVal = (raw) => {
  if (raw == null) return undefined;
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'object') {
    // Composite pn/pne : retourne l'objet entier
    if ('presence' in raw) return raw;
    // Wrapper avec val
    if ('val' in raw) return raw.val;
    // Objet inconnu
    return raw;
  }
  return raw;
};
const getNote = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.note || '') : '';
const getPhotos = (raw) => (raw && typeof raw === 'object' && !Array.isArray(raw)) ? (raw.photos || []) : [];

const isFilled = (c, raw) => {
  const v = getVal(raw);
  if (v === undefined || v === null || v === '') return false;
  // Multi-select : rempli si ≥ 1 élément
  if (Array.isArray(v)) return v.length > 0;
  // Composite pn/pne : rempli si presence est posée
  if (typeof v === 'object' && v !== null) {
    if ('presence' in v) return v.presence === 'yes' || v.presence === 'no';
    if ('val' in v) return v.val !== undefined && v.val !== null && v.val !== '';
  }
  return true;
};
const sectionStats = (s, data) => {
  const items = fillableCriteria(s);
  const filled = items.filter((c) => isFilled(c, data?.[c.id])).length;
  return { filled, total: items.length };
};
const visiteStats = (gare, data) => {
  let f = 0,t = 0;
  SECTIONS.forEach((s) => {
    if (s.skipIf && s.skipIf(gare, data)) return;
    const st = sectionStats(s, data);
    f += st.filled;t += st.total;
  });
  return { filled: f, total: t, pct: t === 0 ? 0 : Math.round(f / t * 100) };
};
const fmtAgo = (ts) => {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'à l\'instant';
  if (m < 60) return `il y a ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  return `il y a ${Math.floor(h / 24)}j`;
};

/* ============================================================
   ATELIER : MINI-PLAN ISOMÉTRIQUE 3D (refonte v2)
   ============================================================ */
function StationMap({ gare, data, activeId, onZone, compact, hasBV, hasFranch, viewMode = 'iso' }) {
  // viewMode: 'iso' (3D iso) | 'plan' (top-down 2D)
  // États par zone : empty (volume filaire/transparent) | partial (mi-rempli) | done (plein encre)
  const z = (id) => {
    const s = SECTIONS.find((x) => x.id === id);
    if (!s) return { state: 'empty', pct: 0 };
    const st = sectionStats(s, data);
    if (st.filled === 0) return { state: 'empty', pct: 0 };
    if (st.filled === st.total) return { state: 'done', pct: 1 };
    return { state: 'partial', pct: st.filled / st.total };
  };

  // Projection isométrique 2:1 (rapport classique)
  // x' = (x - y) * cos(30°), y' = (x + y) * sin(30°) - h
  const ISO_X = 0.866; // cos(30)
  const ISO_Y = 0.5; // sin(30)
  const iso = viewMode === 'plan'
    ? (x, y, h = 0) => ({ x: x, y: y * 0.85 })
    : (x, y, h = 0) => ({ x: (x - y) * ISO_X, y: (x + y) * ISO_Y - h });

  // Couleurs selon état
  const palette = (state, active) => {
    if (active) return {
      top: '#E8475B', // red-soft
      left: '#C8102E', // red
      right: '#9E0B24', // red-dark
      stroke: '#9E0B24',
      text: '#F5F2EB',
      glow: true
    };
    if (state === 'done') return {
      top: '#2A2A2A',
      left: '#1A1A1A',
      right: '#0F0F0F',
      stroke: '#1A1A1A',
      text: '#F5F2EB',
      glow: false
    };
    if (state === 'partial') return {
      top: '#EDE8DD', // paper-deep
      left: '#D9D3C4', // border
      right: '#BFB9AC', // taupe-light
      stroke: '#8B8680',
      text: '#1A1A1A',
      glow: false
    };
    return {
      top: 'transparent',
      left: 'transparent',
      right: 'transparent',
      stroke: '#BFB9AC',
      text: '#8B8680',
      glow: false
    };
  };

  // Bloc 3D : footprint (x,y,w,d) au sol + hauteur h
  // Renvoie un <g> avec 3 faces (top, left, right) en projection iso
  const IsoBlock = ({ id, x, y, w, d, h, label, sublabel, onTop }) => {
    const st = z(id);
    const active = activeId === id;
    const empty = st.state === 'empty' && !active;
    const c = palette(st.state, active);

    // Lift quand actif (le volume "monte")
    const lift = active ? 4 : 0;

    // 8 coins du parallélépipède
    const A = iso(x, y, h + lift); // top-NW
    const B = iso(x + w, y, h + lift); // top-NE
    const C2 = iso(x + w, y + d, h + lift); // top-SE
    const D = iso(x, y + d, h + lift); // top-SW
    const E = iso(x, y + d, lift); // base-SW
    const F = iso(x + w, y + d, lift); // base-SE
    const G = iso(x + w, y, lift); // base-NE

    // Centre face top pour label
    const cx = (A.x + C2.x) / 2;
    const cy = (A.y + C2.y) / 2;

    // partial : on remplit à mi-hauteur
    const partialH = st.state === 'partial' ? h * st.pct : 0;
    const A2 = iso(x, y, partialH);
    const D2 = iso(x, y + d, partialH);
    const F2 = iso(x + w, y + d, partialH);
    const G2 = iso(x + w, y, partialH);

    return (
      <g style={{ cursor: 'pointer', transition: 'transform 0.25s ease-out' }} onClick={() => onZone(id)}>
        {/* Ombre portée au sol */}
        {!empty &&
        <ellipse cx={(A.x + C2.x) / 2 + 2} cy={iso(x + w / 2, y + d / 2, 0).y + h * 0.15}
        rx={w * 0.55} ry={d * 0.30}
        fill="rgba(26,26,26,0.18)" filter="url(#blurShadow)" pointerEvents="none" />
        }

        {/* État VIDE : volume filaire fantôme */}
        {empty &&
        <g pointerEvents="all">
            {/* footprint au sol hachuré */}
            <polygon points={`${E.x},${E.y} ${F.x},${F.y} ${G.x},${G.y} ${iso(x, y, 0).x},${iso(x, y, 0).y}`}
          fill="url(#hatchEmpty)" stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1.5,1" />
            {/* arêtes verticales fantômes */}
            <line x1={D.x} y1={D.y} x2={E.x} y2={E.y} stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1.5" />
            <line x1={C2.x} y1={C2.y} x2={F.x} y2={F.y} stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1.5" />
            <line x1={B.x} y1={B.y} x2={G.x} y2={G.y} stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1.5" />
            {/* top filaire */}
            <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
          fill="rgba(245,242,235,0.4)" stroke="#BFB9AC" strokeWidth="0.5" strokeDasharray="1,1" />
            <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="middle"
          fill="#8B8680" fontSize="3.6" fontWeight="700" letterSpacing="0.5"
          style={{ pointerEvents: 'none', textTransform: 'uppercase' }}>{label}</text>
          </g>
        }

        {/* État PARTIAL : volume rempli à pct */}
        {st.state === 'partial' && !active &&
        <g pointerEvents="all">
            {/* outline volume complet (pointillé) */}
            <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
          fill="rgba(245,242,235,0.5)" stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1" />
            <line x1={D.x} y1={D.y} x2={E.x} y2={E.y} stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1" />
            <line x1={C2.x} y1={C2.y} x2={F.x} y2={F.y} stroke="#BFB9AC" strokeWidth="0.4" strokeDasharray="1,1" />

            {/* volume "rempli" jusqu'à partialH */}
            <polygon points={`${D2.x},${D2.y} ${C2.x === A2.x ? C2.x : iso(x + w, y + d, partialH).x},${iso(x + w, y + d, partialH).y} ${F.x},${F.y} ${E.x},${E.y}`}
          fill={c.left} stroke={c.stroke} strokeWidth="0.5" />
            <polygon points={`${iso(x + w, y + d, partialH).x},${iso(x + w, y + d, partialH).y} ${iso(x + w, y, partialH).x},${iso(x + w, y, partialH).y} ${G.x},${G.y} ${F.x},${F.y}`}
          fill={c.right} stroke={c.stroke} strokeWidth="0.5" />
            <polygon points={`${A2.x},${A2.y} ${iso(x + w, y, partialH).x},${iso(x + w, y, partialH).y} ${iso(x + w, y + d, partialH).x},${iso(x + w, y + d, partialH).y} ${D2.x},${D2.y}`}
          fill={c.top} stroke={c.stroke} strokeWidth="0.5" style={{ strokeWidth: "0px" }} />

            <text x={(A2.x + iso(x + w, y + d, partialH).x) / 2} y={(A2.y + iso(x + w, y + d, partialH).y) / 2 + 1} textAnchor="middle" dominantBaseline="middle"
          fill={c.text} fontSize="3.6" fontWeight="700" letterSpacing="0.5"
          style={{ pointerEvents: 'none', textTransform: 'uppercase' }}>{label}</text>
          </g>
        }

        {/* État DONE / ACTIVE : volume plein */}
        {(st.state === 'done' || active) &&
        <g pointerEvents="all" style={{ filter: active ? 'drop-shadow(0 1px 2px rgba(200,16,46,0.5))' : 'none' }}>
            {/* face gauche */}
            <polygon points={`${D.x},${D.y} ${C2.x},${C2.y} ${F.x},${F.y} ${E.x},${E.y}`}
          fill={c.left} stroke={c.stroke} strokeWidth="0.5" strokeLinejoin="round" />
            {/* face droite */}
            <polygon points={`${C2.x},${C2.y} ${B.x},${B.y} ${G.x},${G.y} ${F.x},${F.y}`}
          fill={c.right} stroke={c.stroke} strokeWidth="0.5" strokeLinejoin="round" />
            {/* face top */}
            <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
          fill={c.top} stroke={c.stroke} strokeWidth="0.5" strokeLinejoin="round" />
            <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="middle"
          fill={c.text} fontSize="3.8" fontWeight="700" letterSpacing="0.6"
          style={{ pointerEvents: 'none', textTransform: 'uppercase' }}>{label}</text>
            {sublabel &&
          <text x={cx} y={cy + 5} textAnchor="middle" dominantBaseline="middle"
          fill={c.text} fontSize="2.4" letterSpacing="0.3" opacity="0.7"
          style={{ pointerEvents: 'none' }}>{sublabel}</text>
          }
          </g>
        }

        {/* Halo pulse si actif */}
        {active &&
        <circle cx={cx} cy={cy} r="3" fill="none" stroke="#C8102E" strokeWidth="0.4">
            <animate attributeName="r" values="3;9;3" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
          </circle>
        }
      </g>);

  };

  // ── Plan unique (valeur visuelle, pas typologique) ──
  // Layout type plan-masse horizontal, lisible en vue 2D et en iso :
  //   - quais larges en haut (toute la largeur, comme la route)
  //   - voies entre les quais
  //   - BV centré
  //   - rangée intermodale juste en dessous (vélos + TC à gauche, parking à droite)
  //   - parvis large devant le BV
  //   - route en bas (toute la largeur, alignée sur les quais)
  // x = sens de la voie (5 ouest → 90 est). y = de la voie (nord, 0) vers la rue (sud, 28).
  const profile = gare?.profile || 'bv_ouvert_pers';
  const noBV = profile === 'halte_simple' || !hasBV;
  const QUAI_LEN = 85;
  const QUAI_X_START = 5;
  const VOIE_W = 3;
  const ROUTE_Y = 28;

  const L = {
    quais: [
      { x: QUAI_X_START, y: 1,  w: QUAI_LEN, d: 2.5 },   // quai nord, large
      { x: QUAI_X_START, y: 6.5, w: QUAI_LEN, d: 2.5 }   // quai sud, large
    ],
    voies: [
      { x: 0, y: 4,  len: 95 },          // voie 1 — alignée sur toute la largeur de la route
      { x: 0, y: 5,  len: 95 }            // voie 2
    ],
    bv:     noBV ? null : { x: 38, y: 13, w: 18, d: 7, h: 5.5 },     // BV centré horizontalement
    franch: !hasFranch ? null : { kind: 'passerelle', x: 45, y: 1, w: 4, d: 8, h: 6 }, // au-dessus des voies
    // Rangée intermodale (TC, vélos, parking côte à côte sous les quais)
    velos:  { x: 17, y: 13, w: 7,  d: 5, h: 1.8 },
    tc:     { x: 26, y: 13, w: 9,  d: 5, h: 2.2 },
    parking:{ x: 60, y: 13, w: 26, d: 7, h: 0.6 },
    parvis: { x: 14, y: 21, w: 72, d: 4, h: 0.4 },          // parvis large devant tout
    routeY: ROUTE_Y,
    // arbres pour ambiance — bords
    trees: [
      { x: 3,  y: 13, h: 4 },   { x: 92, y: 13, h: 4 },
      { x: 3,  y: 24, h: 3.5 }, { x: 92, y: 24, h: 3.5 },
      { x: 50, y: 25, h: 3 },   { x: 35, y: 25, h: 2.5 }
    ]
  };

  // dérivés depuis les quais : rails entre/à côté ; passerelle au-dessus
  const Z_PARKING = { ...L.parking };
  const Z_PARVIS  = { ...L.parvis };
  const Z_VELOS   = { ...L.velos };
  const Z_TC      = { ...L.tc };
  const Z_BV      = L.bv;
  // 1ère et dernière colonne de quais → bornes pour la passerelle/rails
  const quaiXs = L.quais.map(q => q.x);
  const quaiXmin = Math.min(...quaiXs);
  const quaiXmax = Math.max(...quaiXs.map((x, i) => x + L.quais[i].w));

  // Bbox isométrique pour viewBox
  // On calcule les extrêmes en projetant tous les coins clé + élévation passerelle
  const allPoints = [
  iso(0, 0, 0), iso(95, 0, 0), iso(0, 30, 0), iso(95, 30, 0),
  iso(45, 1, 8), iso(49, 9, 8)];

  const minX = Math.min(...allPoints.map((p) => p.x)) - 8;
  const maxX = Math.max(...allPoints.map((p) => p.x)) + 8;
  const minY = Math.min(...allPoints.map((p) => p.y)) - 14;
  const maxY = Math.max(...allPoints.map((p) => p.y)) + 8;
  const VBW = maxX - minX;
  const VBH = maxY - minY;

  return (
    <svg viewBox={`${minX} ${minY} ${VBW} ${VBH}`}
    style={{ width: '100%', height: compact ? 130 : 170, display: 'block', overflow: 'visible' }}
    xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hatchEmpty" patternUnits="userSpaceOnUse" width="2" height="2" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="2" stroke="#D9D3C4" strokeWidth="0.25" />
        </pattern>
        <filter id="blurShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="0.8" />
        </filter>
        <pattern id="isoGrid" patternUnits="userSpaceOnUse" width="3.464" height="2"
        patternTransform="translate(0,0)">
          <path d="M 0 0 L 1.732 1 L 3.464 0 M 0 2 L 1.732 1" stroke="#EDE8DD" strokeWidth="0.15" fill="none" />
        </pattern>
        {/* dégradé de sol — légère profondeur */}
        <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#FBF8F1" />
          <stop offset="100%" stopColor="#EDE8DD" />
        </linearGradient>
        {/* feuillage arbre */}
        <radialGradient id="treeFoliage" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stopColor="#7FA86B" />
          <stop offset="100%" stopColor="#3F6B3A" />
        </radialGradient>
      </defs>

      {/* PLAQUE DE FOND avec dégradé chaud */}
      <g pointerEvents="none">
        <polygon points={`${iso(0, 0, 0).x},${iso(0, 0, 0).y} ${iso(95, 0, 0).x},${iso(95, 0, 0).y} ${iso(95, 36, 0).x},${iso(95, 36, 0).y} ${iso(0, 36, 0).x},${iso(0, 36, 0).y}`}
          fill="url(#groundGrad)" />
      </g>

      {/* GRILLE ISO DE SOL */}
      <g opacity="0.5" pointerEvents="none">
        <polygon points={`${iso(0, 0, 0).x},${iso(0, 0, 0).y} ${iso(95, 0, 0).x},${iso(95, 0, 0).y} ${iso(95, 36, 0).x},${iso(95, 36, 0).y} ${iso(0, 36, 0).x},${iso(0, 36, 0).y}`}
        fill="url(#isoGrid)" />
      </g>

      {/* ROUTE — bande horizontale au sud (avant), toute la largeur */}
      <g pointerEvents="none" opacity="0.55">
        <polygon points={`${iso(0, L.routeY, 0).x},${iso(0, L.routeY, 0).y} ${iso(95, L.routeY, 0).x},${iso(95, L.routeY, 0).y} ${iso(95, 36, 0).x},${iso(95, 36, 0).y} ${iso(0, 36, 0).x},${iso(0, 36, 0).y}`}
        fill="#EDE8DD" stroke="#D9D3C4" strokeWidth="0.3" />
        {/* tirets centraux de route, le long de x */}
        {[...Array(8)].map((_, i) => {
          const cx0 = 5 + i * 11;
          const p1 = iso(cx0, (L.routeY + 36) / 2, 0);
          const p2 = iso(cx0 + 6, (L.routeY + 36) / 2, 0);
          return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#BFB9AC" strokeWidth="0.4" />;
        })}
      </g>

      {/* RAILS — voies horizontales (sens x), traverses perpendiculaires (sens y) */}
      {(() => {
        const sleeperColor = '#8B8680';
        return (
          <g pointerEvents="none">
            {L.voies.map((v, vi) => {
              // v.x = début de voie (x), v.y = position perpendiculaire, v.len = longueur
              const xStart = v.x;
              const xEnd = v.x + v.len;
              // ballast : bande légère
              const bA = iso(xStart, v.y - VOIE_W/2, 0);
              const bB = iso(xEnd, v.y - VOIE_W/2, 0);
              const bC = iso(xEnd, v.y + VOIE_W/2, 0);
              const bD = iso(xStart, v.y + VOIE_W/2, 0);
              // Aiguillage : si v.aiguillage, on rétrécit/converge aux extrémités (visuel simple)
              // 2 rails parallèles (bord nord et bord sud du gabarit)
              const railOffset = VOIE_W * 0.28;
              const r1a = iso(xStart, v.y - railOffset, 0.1);
              const r1b = iso(xEnd, v.y - railOffset, 0.1);
              const r2a = iso(xStart, v.y + railOffset, 0.1);
              const r2b = iso(xEnd, v.y + railOffset, 0.1);
              // Traverses perpendiculaires (le long de y, espacées en x)
              const nSleepers = Math.floor(v.len / 2);
              const sleepers = [...Array(nSleepers)].map((_, i) => {
                const xx = xStart + 1 + i * 2;
                const p1 = iso(xx, v.y - VOIE_W/2 + 0.3, 0.05);
                const p2 = iso(xx, v.y + VOIE_W/2 - 0.3, 0.05);
                return <line key={`s-${vi}-${i}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
                  stroke={sleeperColor} strokeWidth="0.35" opacity="0.55" />;
              });
              return (
                <g key={`v-${vi}`}>
                  <polygon points={`${bA.x},${bA.y} ${bB.x},${bB.y} ${bC.x},${bC.y} ${bD.x},${bD.y}`}
                    fill="#D9D3C4" opacity="0.45" />
                  {sleepers}
                  <line x1={r1a.x} y1={r1a.y} x2={r1b.x} y2={r1b.y} stroke="#1A1A1A" strokeWidth="0.4" opacity="0.8" />
                  <line x1={r2a.x} y1={r2a.y} x2={r2b.x} y2={r2b.y} stroke="#1A1A1A" strokeWidth="0.4" opacity="0.8" />
                  {/* Flèche de sens (petite) au milieu de la voie */}
                  {(() => {
                    const mid = iso(xStart + v.len/2, v.y, 0.5);
                    const tip = iso(xStart + v.len/2 + 2, v.y, 0.5);
                    const tail = iso(xStart + v.len/2 - 2, v.y, 0.5);
                    return (
                      <g opacity="0.5">
                        <line x1={tail.x} y1={tail.y} x2={tip.x} y2={tip.y} stroke="#C8102E" strokeWidth="0.3" />
                        <polygon points={`${tip.x},${tip.y} ${tip.x-1},${tip.y-0.5} ${tip.x-1},${tip.y+0.5}`} fill="#C8102E" />
                      </g>
                    );
                  })()}
                </g>
              );
            })}
          </g>
        );
      })()}

      {/* ARBRES — petits volumes ronds en feuillage iso */}
      <g pointerEvents="none">
        {L.trees.map((t, i) => {
          // tronc : petit cylindre marron (carré simplifié)
          const trunkH = t.h * 0.35;
          const tA = iso(t.x - 0.4, t.y - 0.4, trunkH);
          const tB = iso(t.x + 0.4, t.y - 0.4, trunkH);
          const tC = iso(t.x + 0.4, t.y + 0.4, trunkH);
          const tD = iso(t.x - 0.4, t.y + 0.4, trunkH);
          const tE = iso(t.x - 0.4, t.y + 0.4, 0);
          const tF = iso(t.x + 0.4, t.y + 0.4, 0);
          // feuillage : ellipse projetée
          const fc = iso(t.x, t.y, t.h * 0.85);
          const r = t.h * 0.55;
          // ombre
          const sc = iso(t.x + 0.4, t.y + 0.4, 0);
          return (
            <g key={i}>
              <ellipse cx={sc.x} cy={sc.y + 0.6} rx={r * 0.9} ry={r * 0.4}
                fill="rgba(26,26,26,0.18)" filter="url(#blurShadow)" />
              {/* tronc */}
              <polygon points={`${tA.x},${tA.y} ${tB.x},${tB.y} ${tC.x},${tC.y} ${tD.x},${tD.y}`}
                fill="#5C3A1E" />
              <polygon points={`${tD.x},${tD.y} ${tC.x},${tC.y} ${tF.x},${tF.y} ${tE.x},${tE.y}`}
                fill="#3D2510" />
              {/* feuillage : 3 boules superposées pour effet "buisson" */}
              <ellipse cx={fc.x - r * 0.3} cy={fc.y + r * 0.2} rx={r * 0.7} ry={r * 0.6}
                fill="#5A8A4D" opacity="0.85" />
              <ellipse cx={fc.x + r * 0.2} cy={fc.y + r * 0.1} rx={r * 0.65} ry={r * 0.55}
                fill="url(#treeFoliage)" />
              <ellipse cx={fc.x - r * 0.1} cy={fc.y - r * 0.2} rx={r * 0.55} ry={r * 0.5}
                fill="#8FBA72" opacity="0.7" />
            </g>
          );
        })}
      </g>

      {/* VOITURE qui passe sur la route */}
      <g pointerEvents="none">
        {(() => {
          const cy = (L.routeY + 36) / 2 - 1.5;
          const cw = 4, cd = 2;
          const ch = 1.4;
          const A = iso(0, cy, ch);
          const B = iso(cw, cy, ch);
          const C2 = iso(cw, cy + cd, ch);
          const D = iso(0, cy + cd, ch);
          const E = iso(0, cy + cd, 0.05);
          const F = iso(cw, cy + cd, 0.05);
          return (
            <g>
              <animateTransform attributeName="transform" type="translate"
                from={`${iso(-10, 0, 0).x - iso(0, 0, 0).x} ${iso(-10, 0, 0).y - iso(0, 0, 0).y}`}
                to={`${iso(110, 0, 0).x - iso(0, 0, 0).x} ${iso(110, 0, 0).y - iso(0, 0, 0).y}`}
                dur="9s" repeatCount="indefinite" />
              <polygon points={`${E.x},${E.y} ${F.x},${F.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
                fill="#1A1A1A" />
              <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
                fill="#2A4D8F" stroke="#0F2A55" strokeWidth="0.2" />
              {/* pare-brise */}
              {(() => {
                const wA = iso(0.6, cy, ch);
                const wB = iso(cw - 0.6, cy, ch);
                const wC = iso(cw - 0.6, cy + cd, ch);
                const wD = iso(0.6, cy + cd, ch);
                return <polygon
                  points={`${wA.x},${wA.y} ${wB.x},${wB.y} ${wC.x},${wC.y} ${wD.x},${wD.y}`}
                  fill="#A0C0E0" opacity="0.8" />;
              })()}
            </g>
          );
        })()}
      </g>

      <IsoBlock id="parking" {...Z_PARKING} label="Parking" sublabel="🚗" />
      {(z('parking').state !== 'empty' || activeId === 'parking') &&
      <g pointerEvents="none" opacity="0.4">
          {[0, 1, 2, 3].map((i) => {
          const xx = Z_PARKING.x + 2 + i * (Z_PARKING.w - 4) / 4;
          const p1 = iso(xx, Z_PARKING.y + 1, Z_PARKING.h + (activeId === 'parking' ? 4 : 0) + 0.1);
          const p2 = iso(xx, Z_PARKING.y + Z_PARKING.d - 1, Z_PARKING.h + (activeId === 'parking' ? 4 : 0) + 0.1);
          return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
          stroke="#F5F2EB" strokeWidth="0.2" opacity="0.6" />;
        })}
        </g>
      }

      {/* QUAIS — depuis le layout */}
      {L.quais.map((q, i) => (
        <g key={`quai-${i}`} style={{ cursor: 'pointer' }} onClick={() => onZone('quais')}>
          <IsoBlock id="quais" x={q.x} y={q.y} w={q.w} d={q.d} h={1} label={L.quais.length > 1 ? `Quai ${i+1}` : 'Quai'} />
        </g>
      ))}

      {/* TRAIN qui passe — design TER rouge AREP, multi-éléments crédibles */}
      <g pointerEvents="none">
        <g>
          {(() => {
            const v = L.voies[0];
            const trainW = 18;     // train plus long (18 unités)
            const trainH = 2.4;    // gabarit
            const trainTop = 1.7;  // hauteur du toit
            const trainBase = 0.3; // base au-dessus des rails
            const yMid = v.y;
            const yN = yMid - trainH/2;
            const yS = yMid + trainH/2;

            // Animation : translate selon l'axe iso (suit la diagonale)
            const xStart = -22, xEnd = 115;
            const isoDx = (iso(xEnd, 0, 0).x - iso(xStart, 0, 0).x);
            const isoDy = (iso(xEnd, 0, 0).y - iso(xStart, 0, 0).y);
            const isoStartDx = (iso(xStart, 0, 0).x - iso(0, 0, 0).x);
            const isoStartDy = (iso(xStart, 0, 0).y - iso(0, 0, 0).y);

            // Coins du corps principal (boîte rectangulaire centrale)
            const A = iso(0,       yN, trainTop);
            const B = iso(trainW,  yN, trainTop);
            const C = iso(trainW,  yS, trainTop);
            const D = iso(0,       yS, trainTop);
            const E = iso(0,       yS, trainBase);
            const F = iso(trainW,  yS, trainBase);

            // Palette TER rouge AREP
            const arepRed   = '#C8102E';
            const arepRedDark = '#9E0B24';
            const arepRedLite = '#E8475B';
            const roofGrey  = '#2A2A2A';
            const roofLite  = '#3F3F3F';
            const window    = '#0F1F38';
            const windowBri = '#3F5C8A';
            const white     = '#F5F2EB';
            const black     = '#1A1A1A';
            const yellow    = '#FFD24A';
            const wheelGrey = '#1A1A1A';

            return (
              <g>
                <animateTransform attributeName="transform" type="translate"
                  from={`${isoStartDx} ${isoStartDy}`}
                  to={`${isoStartDx + isoDx} ${isoStartDy + isoDy}`}
                  dur="16s" repeatCount="indefinite" />

                {/* Face sud (côté observateur) — corps rouge */}
                <polygon points={`${E.x},${E.y} ${F.x},${F.y} ${C.x},${C.y} ${D.x},${D.y}`}
                  fill={arepRed} stroke={arepRedDark} strokeWidth="0.15" />

                {/* Bandeau blanc fin sous les fenêtres (livrée TER) */}
                {(() => {
                  const r1 = iso(0,      yS, 1.0);
                  const r2 = iso(trainW, yS, 1.0);
                  const r3 = iso(trainW, yS, 0.9);
                  const r4 = iso(0,      yS, 0.9);
                  return <polygon points={`${r1.x},${r1.y} ${r2.x},${r2.y} ${r3.x},${r3.y} ${r4.x},${r4.y}`}
                    fill={white} />;
                })()}

                {/* Bandeau blanc fin au-dessus des fenêtres (juste sous le toit) */}
                {(() => {
                  const r1 = iso(0,      yS, 1.55);
                  const r2 = iso(trainW, yS, 1.55);
                  const r3 = iso(trainW, yS, 1.45);
                  const r4 = iso(0,      yS, 1.45);
                  return <polygon points={`${r1.x},${r1.y} ${r2.x},${r2.y} ${r3.x},${r3.y} ${r4.x},${r4.y}`}
                    fill={white} />;
                })()}

                {/* Ligne sombre sous-bas (chassis) */}
                {(() => {
                  const r1 = iso(0,      yS, 0.45);
                  const r2 = iso(trainW, yS, 0.45);
                  const r3 = iso(trainW, yS, 0.3);
                  const r4 = iso(0,      yS, 0.3);
                  return <polygon points={`${r1.x},${r1.y} ${r2.x},${r2.y} ${r3.x},${r3.y} ${r4.x},${r4.y}`}
                    fill={black} />;
                })()}

                {/* Toit du train — gris foncé */}
                <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y} ${D.x},${D.y}`}
                  fill={roofGrey} stroke={roofLite} strokeWidth="0.15" />

                {/* Climatisations sur le toit (3 blocs en relief) */}
                {[3.5, 8.0, 12.5].map((cx, i) => {
                  const cw = 1.8, cd = 1.2, ch = 0.3;
                  const a = iso(cx, yMid - cd/2, trainTop + ch);
                  const b = iso(cx + cw, yMid - cd/2, trainTop + ch);
                  const c = iso(cx + cw, yMid + cd/2, trainTop + ch);
                  const d = iso(cx, yMid + cd/2, trainTop + ch);
                  const e = iso(cx + cw, yMid + cd/2, trainTop);
                  const f = iso(cx + cw, yMid - cd/2, trainTop);
                  return (
                    <g key={`ac-${i}`}>
                      <polygon points={`${a.x},${a.y} ${b.x},${b.y} ${c.x},${c.y} ${d.x},${d.y}`}
                        fill={roofLite} stroke={black} strokeWidth="0.1" />
                      <polygon points={`${b.x},${b.y} ${f.x},${f.y} ${e.x},${e.y} ${c.x},${c.y}`}
                        fill={roofGrey} stroke={black} strokeWidth="0.1" />
                    </g>
                  );
                })}

                {/* Fenêtres (5 grandes le long de la face sud, alignées) */}
                {[1.4, 4.2, 7.4, 10.6, 13.8].map((fx, i) => {
                  const wA = iso(fx,       yS, 1.4);
                  const wB = iso(fx + 2.2, yS, 1.4);
                  const wC = iso(fx + 2.2, yS, 1.05);
                  const wD = iso(fx,       yS, 1.05);
                  return <g key={i}>
                    <polygon points={`${wA.x},${wA.y} ${wB.x},${wB.y} ${wC.x},${wC.y} ${wD.x},${wD.y}`}
                      fill={window} />
                    {/* léger reflet */}
                    <polygon points={`${wA.x},${wA.y} ${wB.x},${wB.y} ${wB.x - 0.18},${wB.y + 0.16} ${wA.x - 0.18},${wA.y + 0.16}`}
                      fill={windowBri} opacity="0.55" />
                  </g>;
                })}

                {/* Portes d'accès (2 portes vitrées entre les groupes de fenêtres) */}
                {[3.6, 13.2].map((dx, i) => {
                  const dA = iso(dx,       yS, 1.45);
                  const dB = iso(dx + 0.6, yS, 1.45);
                  const dC = iso(dx + 0.6, yS, 0.5);
                  const dD = iso(dx,       yS, 0.5);
                  // ligne de séparation (où la porte s'ouvre)
                  const sepA = iso(dx + 0.3, yS, 1.45);
                  const sepB = iso(dx + 0.3, yS, 0.5);
                  return (
                    <g key={`d-${i}`}>
                      <polygon points={`${dA.x},${dA.y} ${dB.x},${dB.y} ${dC.x},${dC.y} ${dD.x},${dD.y}`}
                        fill={arepRedDark} stroke={black} strokeWidth="0.1" />
                      <line x1={sepA.x} y1={sepA.y} x2={sepB.x} y2={sepB.y}
                        stroke={black} strokeWidth="0.1" />
                      {/* hublot fenêtre dans la porte */}
                      <rect x={(dA.x + dB.x)/2 - 0.4} y={(dA.y + dB.y)/2 + 0.1}
                        width="0.8" height="0.5" fill={window} />
                    </g>
                  );
                })}

                {/* Pantographe simple (ligne en Z + barre de contact) */}
                {(() => {
                  const px = 6.5;  // position x du pantographe
                  const baseS = iso(px, yMid, trainTop);
                  const arm1 = iso(px + 1.0, yMid, trainTop + 1.0);
                  const arm2 = iso(px + 0.3, yMid, trainTop + 2.0);
                  const barL = iso(px - 0.6, yMid - 0.8, trainTop + 2.1);
                  const barR = iso(px + 1.2, yMid + 0.8, trainTop + 2.1);
                  return (
                    <g stroke={black} fill="none">
                      {/* socle */}
                      <rect x={baseS.x - 0.4} y={baseS.y - 0.2} width="0.8" height="0.3"
                        fill={roofLite} stroke={black} strokeWidth="0.08" />
                      {/* bras en Z */}
                      <line x1={baseS.x} y1={baseS.y} x2={arm1.x} y2={arm1.y} strokeWidth="0.18" />
                      <line x1={arm1.x} y1={arm1.y} x2={arm2.x} y2={arm2.y} strokeWidth="0.18" />
                      {/* barre de contact (transverse) */}
                      <line x1={barL.x} y1={barL.y} x2={barR.x} y2={barR.y} strokeWidth="0.22" />
                      {/* fil caténaire au-dessus (suggestif) */}
                      <line x1={iso(0, yMid, trainTop + 2.3).x} y1={iso(0, yMid, trainTop + 2.3).y}
                            x2={iso(trainW, yMid, trainTop + 2.3).x} y2={iso(trainW, yMid, trainTop + 2.3).y}
                            stroke={black} strokeWidth="0.1" opacity="0.4" />
                    </g>
                  );
                })()}

                {/* Cabine avant — nez incliné */}
                {(() => {
                  // cabine côté est : nez qui s'incline vers la pointe
                  const nLift = 0.15;  // léger affaissement du toit vers le nez
                  const cabA = iso(trainW,       yN, trainTop - nLift);
                  const cabB = iso(trainW + 1.6, yMid, trainTop - 0.4);
                  const cabC = iso(trainW,       yS, trainTop - nLift);
                  const cabD = iso(trainW,       yS, trainBase);
                  const cabE = iso(trainW + 1.6, yMid, trainBase + 0.15);
                  const cabF = iso(trainW,       yN, trainBase);
                  return (
                    <g>
                      {/* face avant inclinée — corps rouge */}
                      <polygon points={`${cabA.x},${cabA.y} ${cabB.x},${cabB.y} ${cabC.x},${cabC.y} ${cabD.x},${cabD.y} ${cabE.x},${cabE.y}`}
                        fill={arepRedLite} stroke={arepRedDark} strokeWidth="0.15" />
                      {/* dessus du nez */}
                      <polygon points={`${cabA.x},${cabA.y} ${cabB.x},${cabB.y} ${cabC.x},${cabC.y}`}
                        fill={roofGrey} stroke={black} strokeWidth="0.12" />
                      {/* bandeau blanc continu sur la cabine */}
                      <polygon points={`${iso(trainW, yS, 1.0).x},${iso(trainW, yS, 1.0).y} ${iso(trainW + 1.4, yMid, 0.85).x},${iso(trainW + 1.4, yMid, 0.85).y} ${iso(trainW + 1.4, yMid, 0.75).x},${iso(trainW + 1.4, yMid, 0.75).y} ${iso(trainW, yS, 0.9).x},${iso(trainW, yS, 0.9).y}`}
                        fill={white} />
                    </g>
                  );
                })()}

                {/* Pare-brise du conducteur (avant) */}
                {(() => {
                  const wA = iso(trainW - 0.1, yS - 0.1, 1.5);
                  const wB = iso(trainW + 1.0, yMid + 0.1, 1.25);
                  const wC = iso(trainW + 1.0, yMid + 0.1, 0.85);
                  const wD = iso(trainW - 0.1, yS - 0.1, 1.05);
                  return <polygon points={`${wA.x},${wA.y} ${wB.x},${wB.y} ${wC.x},${wC.y} ${wD.x},${wD.y}`}
                    fill={window} stroke={black} strokeWidth="0.1" />;
                })()}

                {/* Cabine arrière (côté ouest) — symétrique */}
                {(() => {
                  const cabA = iso(0,    yN, trainTop - 0.15);
                  const cabB = iso(-1.6, yMid, trainTop - 0.4);
                  const cabC = iso(0,    yS, trainTop - 0.15);
                  const cabD = iso(0,    yS, trainBase);
                  const cabE = iso(-1.6, yMid, trainBase + 0.15);
                  return (
                    <g>
                      <polygon points={`${cabA.x},${cabA.y} ${cabB.x},${cabB.y} ${cabC.x},${cabC.y} ${cabD.x},${cabD.y} ${cabE.x},${cabE.y}`}
                        fill={arepRedLite} stroke={arepRedDark} strokeWidth="0.15" />
                      <polygon points={`${cabA.x},${cabA.y} ${cabB.x},${cabB.y} ${cabC.x},${cabC.y}`}
                        fill={roofGrey} stroke={black} strokeWidth="0.12" />
                    </g>
                  );
                })()}

                {/* Phare avant (jaune chaud, clignotant) + feu arrière (rouge) */}
                {(() => {
                  const phAv = iso(trainW + 1.4, yMid, 0.55);
                  const phAr = iso(-1.4, yMid, 0.55);
                  return (
                    <g>
                      <circle cx={phAv.x} cy={phAv.y} r="0.32" fill={yellow} stroke={black} strokeWidth="0.08">
                        <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
                      </circle>
                      <circle cx={phAr.x} cy={phAr.y} r="0.24" fill={arepRed} stroke={black} strokeWidth="0.06" opacity="0.95"/>
                    </g>
                  );
                })()}

                {/* Bogies (2 groupes de roues sous le train, position réaliste) */}
                {[2.5, 14.5].map((bx, i) => {
                  const bA = iso(bx,         yS - 0.25, 0.3);
                  const bB = iso(bx + 2.0,   yS - 0.25, 0.3);
                  const bC = iso(bx + 2.0,   yS - 0.25, 0.0);
                  const bD = iso(bx,         yS - 0.25, 0.0);
                  const w1 = iso(bx + 0.4,   yS - 0.25, 0.05);
                  const w2 = iso(bx + 1.6,   yS - 0.25, 0.05);
                  return (
                    <g key={`b-${i}`}>
                      <polygon points={`${bA.x},${bA.y} ${bB.x},${bB.y} ${bC.x},${bC.y} ${bD.x},${bD.y}`}
                        fill={wheelGrey} />
                      <circle cx={w1.x} cy={w1.y} r="0.38" fill="#1A1A1A" stroke="#000" strokeWidth="0.1" />
                      <circle cx={w2.x} cy={w2.y} r="0.38" fill="#1A1A1A" stroke="#000" strokeWidth="0.1" />
                      {/* point central des roues (pour effet rotation) */}
                      <circle cx={w1.x} cy={w1.y} r="0.1" fill="#5A5A5A" />
                      <circle cx={w2.x} cy={w2.y} r="0.1" fill="#5A5A5A" />
                    </g>
                  );
                })}

                {/* Petite ombre au sol sous le train */}
                {(() => {
                  const sA = iso(0,      yS + 0.2, 0);
                  const sB = iso(trainW, yS + 0.2, 0);
                  const sC = iso(trainW, yS + 0.6, 0);
                  const sD = iso(0,      yS + 0.6, 0);
                  return <polygon points={`${sA.x},${sA.y} ${sB.x},${sB.y} ${sC.x},${sC.y} ${sD.x},${sD.y}`}
                    fill="rgba(26,26,26,0.18)" />;
                })()}
              </g>
            );
          })()}
        </g>
      </g>

      {/* PARVIS */}
      <IsoBlock id="abords" {...Z_PARVIS} label="Parvis" sublabel="🚶" />

      {/* VÉLOS — petit abri */}
      <IsoBlock id="velos" {...Z_VELOS} label="Vélo" />
      {/* TC — abribus */}
      <IsoBlock id="tc" {...Z_TC} label="TC" />

      {/* BV — bâtiment voyageurs avec toit en pignon */}
      {Z_BV &&
      <>
          <IsoBlock id="bv" {...Z_BV} label="BV" sublabel="🏛" />
          {/* TOIT EN PIGNON sur BV */}
          {(() => {
          const st = z('bv');
          const active = activeId === 'bv';
          const empty = st.state === 'empty' && !active;
          if (empty) return null;
          const c = palette(st.state, active);
          const lift = active ? 4 : 0;
          const baseH = Z_BV.h + lift;
          const peakH = baseH + 3;
          const A = iso(Z_BV.x, Z_BV.y, baseH);
          const B = iso(Z_BV.x + Z_BV.w, Z_BV.y, baseH);
          const C2 = iso(Z_BV.x + Z_BV.w, Z_BV.y + Z_BV.d, baseH);
          const D = iso(Z_BV.x, Z_BV.y + Z_BV.d, baseH);
          const ridge1 = iso(Z_BV.x, Z_BV.y + Z_BV.d / 2, peakH);
          const ridge2 = iso(Z_BV.x + Z_BV.w, Z_BV.y + Z_BV.d / 2, peakH);
          return (
            <g style={{ cursor: 'pointer' }} onClick={() => onZone('bv')}>
                <polygon points={`${ridge1.x},${ridge1.y} ${ridge2.x},${ridge2.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
              fill="#9E0B24" stroke="#7A0820" strokeWidth="0.4" />
                <polygon points={`${ridge1.x},${ridge1.y} ${ridge2.x},${ridge2.y} ${B.x},${B.y} ${A.x},${A.y}`}
              fill="#C8102E" stroke="#7A0820" strokeWidth="0.4" opacity="0.85" />
                <polygon points={`${A.x},${A.y} ${ridge1.x},${ridge1.y} ${D.x},${D.y}`}
              fill="#8B0820" stroke="#7A0820" strokeWidth="0.4" />
              </g>);

        })()}
        </>
      }

      {/* FRANCHISSEMENT — passerelle aérienne OU souterrain (PI) */}
      {L.franch && L.franch.kind === 'passerelle' &&
      <>
          {(() => {
          const st = z('franch');
          const active = activeId === 'franch';
          if (st.state === 'empty' && !active) return null;
          const c = palette(st.state, active);
          const lift = active ? 4 : 0;
          // passerelle traverse en y, au-dessus des voies
          const fx = L.franch.x;
          const fw = L.franch.w;          // épaisseur (sens x)
          const fy1 = L.franch.y;
          const fy2 = L.franch.y + L.franch.d; // longueur en y
          const fh = L.franch.h + lift;
          const A = iso(fx, fy1, fh);
          const B = iso(fx + fw, fy1, fh);
          const C2 = iso(fx + fw, fy2, fh);
          const D = iso(fx, fy2, fh);
          const E = iso(fx, fy1, 0.05);
          const F = iso(fx + fw, fy1, 0.05);
          const G = iso(fx + fw, fy2, 0.05);
          const H = iso(fx, fy2, 0.05);
          return (
            <g style={{ cursor:'pointer' }} onClick={() => onZone('franch')}>
              {/* piliers (faces verticales) */}
              <polygon points={`${B.x},${B.y} ${C2.x},${C2.y} ${G.x},${G.y} ${F.x},${F.y}`}
                fill={c.right} stroke={c.stroke} strokeWidth="0.3" opacity="0.85" />
              <polygon points={`${A.x},${A.y} ${D.x},${D.y} ${H.x},${H.y} ${E.x},${E.y}`}
                fill={c.left} stroke={c.stroke} strokeWidth="0.3" opacity="0.7" />
              {/* tablier */}
              <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
                fill={c.top} stroke={c.stroke} strokeWidth="0.4" />
              {/* garde-corps */}
              <line x1={A.x} y1={A.y - 0.6} x2={D.x} y2={D.y - 0.6} stroke={c.stroke} strokeWidth="0.2" opacity="0.6" />
              <line x1={B.x} y1={B.y - 0.6} x2={C2.x} y2={C2.y - 0.6} stroke={c.stroke} strokeWidth="0.2" opacity="0.6" />
              {/* label */}
              <text x={(A.x + C2.x)/2} y={(A.y + C2.y)/2 + 1} textAnchor="middle" dominantBaseline="middle"
                fill={c.text} fontSize="3" fontWeight="700" letterSpacing="0.4"
                style={{ pointerEvents:'none', textTransform:'uppercase' }}>PS</text>
            </g>
          );
        })()}
        </>
      }
      {L.franch && L.franch.kind === 'souterrain' &&
      <>
          {(() => {
          const st = z('franch');
          const active = activeId === 'franch';
          if (st.state === 'empty' && !active) return null;
          const c = palette(st.state, active);
          // PI : footprint au sol + traits tiretés sous le quai
          const fx = L.franch.x;
          const fw = L.franch.w;
          const fy1 = L.franch.y;
          const fy2 = L.franch.y + L.franch.d;
          const A = iso(fx, fy1, 0.15);
          const B = iso(fx + fw, fy1, 0.15);
          const C2 = iso(fx + fw, fy2, 0.15);
          const D = iso(fx, fy2, 0.15);
          return (
            <g style={{ cursor:'pointer' }} onClick={() => onZone('franch')}>
              {/* footprint tireté (au sol, indique souterrain en-dessous) */}
              <polygon points={`${A.x},${A.y} ${B.x},${B.y} ${C2.x},${C2.y} ${D.x},${D.y}`}
                fill={c.top} stroke={c.stroke} strokeWidth="0.5" strokeDasharray="1.2,0.8"
                opacity={active ? 0.9 : 0.7} />
              {/* hachures internes pour montrer "passage en-dessous" */}
              {[0,1,2,3].map(i => {
                const t = (i+1)/5;
                const p1 = iso(fx, fy1 + (fy2-fy1)*t, 0.16);
                const p2 = iso(fx + fw, fy1 + (fy2-fy1)*t, 0.16);
                return <line key={i} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
                  stroke={c.stroke} strokeWidth="0.2" strokeDasharray="0.6,0.6" opacity="0.5" />;
              })}
              <text x={(A.x + C2.x)/2} y={(A.y + C2.y)/2 + 1} textAnchor="middle" dominantBaseline="middle"
                fill={c.text} fontSize="3" fontWeight="700" letterSpacing="0.4"
                style={{ pointerEvents:'none', textTransform:'uppercase' }}>PI</text>
            </g>
          );
        })()}
        </>
      }

      {/* PARCOURS DU VISITEUR — ligne pointillée animée rouge, monte verticalement de la route au quai */}
      {(() => {
        const p = (px, py, ph = 0.2) => iso(px, py, ph);
        const lastQuai = L.quais[L.quais.length - 1];
        // entrée du quai côté centre, près de la passerelle si présente
        const quaiCenterX = L.franch ? L.franch.x + L.franch.w / 2 : lastQuai.x + lastQuai.w / 2;
        const quaiCenterY = lastQuai.y + lastQuai.d / 2;
        // x central du parvis et BV pour un trajet vertical propre
        const pcx = Z_PARVIS.x + Z_PARVIS.w / 2;
        const path = [];
        // 1. arrivée depuis la route au centre
        path.push(p(pcx, L.routeY + 0.5));
        // 2. on traverse jusqu'au parvis (juste au-dessus de la route)
        path.push(p(pcx, Z_PARVIS.y + Z_PARVIS.d / 2));
        // 3. on remonte au BV si présent (centré horizontalement)
        if (Z_BV) {
          path.push(p(Z_BV.x + Z_BV.w / 2, Z_BV.y + Z_BV.d / 2));
        }
        // 4. franchissement (passerelle = en hauteur, sinon au sol au niveau des voies)
        if (L.franch) {
          const fcx = L.franch.x + L.franch.w / 2;
          const fcy = L.franch.y + L.franch.d / 2;
          const fh = L.franch.kind === 'passerelle' ? L.franch.h : 0.2;
          // on rejoint la passerelle par sa base sud (côté ville)
          path.push(p(fcx, L.franch.y + L.franch.d - 0.5, fh));
          path.push(p(fcx, fcy, fh));
        }
        // 5. quai final
        path.push(p(quaiCenterX, quaiCenterY, 1));
        const d = path.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' ');

        // Petit segment route → parking, en parallèle (pour montrer l'autre flux)
        const parkingEntryX = Z_PARKING.x + Z_PARKING.w / 2;
        const parkingPath = `M ${p(parkingEntryX, L.routeY + 0.5).x} ${p(parkingEntryX, L.routeY + 0.5).y} L ${p(parkingEntryX, Z_PARKING.y + Z_PARKING.d - 1).x} ${p(parkingEntryX, Z_PARKING.y + Z_PARKING.d - 1).y}`;

        return (
          <g pointerEvents="none">
            {/* flux principal piéton : route → parvis → BV → quai */}
            <path d={d} stroke="#C8102E" strokeWidth="0.5" strokeDasharray="1.5,1" fill="none" opacity="0.6">
              <animate attributeName="stroke-dashoffset" values="0;-2.5" dur="1s" repeatCount="indefinite" />
            </path>
            {/* flux secondaire : route → parking */}
            <path d={parkingPath} stroke="#C8102E" strokeWidth="0.4" strokeDasharray="1,1.2" fill="none" opacity="0.4" />
            {/* point départ + arrivée */}
            <circle cx={path[0].x} cy={path[0].y} r="0.8" fill="#C8102E" />
            <circle cx={path[path.length - 1].x} cy={path[path.length - 1].y} r="1" fill="#C8102E">
              <animate attributeName="r" values="1;1.6;1" dur="1.5s" repeatCount="indefinite" />
            </circle>
          </g>);

      })()}

      {/* Label gare en haut à gauche */}
      <text x={minX + 4} y={minY + 6} fontSize="3.8" fontWeight="700" fill="#1A1A1A" letterSpacing="0.5">
        {gare.nom.toUpperCase()}
      </text>
      <text x={minX + 4} y={minY + 10} fontSize="2.4" fill="#8B8680" letterSpacing="0.4">
        UIC {gare.uic} · {gare.cat_sgp?.toUpperCase()}
      </text>
    </svg>);

}

/* ============================================================
   COMPONENTS — small UI atoms
   ============================================================ */
function Kicker({ children, color = 'var(--red)' }) {
  return (
    <div className="kicker" style={{ display: 'flex', alignItems: 'center', gap: 10, color, marginBottom: 8 }}>
      <span style={{ width: 18, height: 1.5, background: color }} />
      {children}
    </div>);

}

function ProgressRing({ pct, size = 44, stroke = 4, color = 'var(--red)' }) {
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  return (
    <div style={{ width: size, height: size, position: 'relative', flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--border)" strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - pct / 100)}
        style={{ transition: 'stroke-dashoffset 0.4s ease' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: size > 50 ? 13 : 10, fontWeight: 700, fontVariantNumeric: 'tabular-nums' }}>
        {pct}%
      </div>
    </div>);

}

function Stamp({ children, color = 'var(--red)' }) {
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '2px 7px', border: `1.2px solid ${color}`, color,
      borderRadius: 2, fontSize: 9.5, fontWeight: 700, letterSpacing: '0.12em',
      textTransform: 'uppercase', transform: 'rotate(-1.5deg)',
      fontFamily: 'var(--font-display)'
    }}>{children}</div>);

}


/* ============================================================
   HERO ACCUEIL — sobre, sans carte
   ============================================================ */
function FriendlyHero({ all, auteur, visites, fullyDone, inProgress, visited, totalGares, onPick, onOpen }) {
  const mine = visites.filter(v => v.auteur === auteur);
  const lastMine = mine[0];
  const mineOpen = mine.filter(v => {
    const g = GARES.find(x => x.nom === v.gare);
    return g && visiteStats(g, v.data).pct < 100;
  }).length;



  const ribbon = GARES.map((g) => {
    const v = all[g.nom];
    if (!v) return 'todo';
    const pct = visiteStats(g, v.data).pct;
    return pct === 100 ? 'done' : 'wip';
  });

  return (
    <div style={{ position: 'relative', overflow: 'hidden', background: 'var(--paper-light)' }}>
      <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none',
        backgroundImage:
          'radial-gradient(ellipse 600px 400px at 100% 0%, rgba(200,16,46,0.05), transparent 60%),' +
          'radial-gradient(ellipse 500px 300px at 0% 100%, rgba(217,211,196,0.4), transparent 60%)'
      }} />

      <div style={{ position: 'relative', padding: '22px 22px 18px' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
          marginBottom: 18, fontSize: 9.5, letterSpacing:'0.16em', color:'var(--taupe)',
          textTransform:'uppercase' }}>
          <span>◆&nbsp;&nbsp;Carnet · SERM Touraine</span>
          <span style={{ fontWeight:600 }}>{new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'short' })}</span>
        </div>

        <h1 style={{ fontFamily:'var(--font-display)', fontSize: 30, fontWeight: 700,
          letterSpacing:'-0.025em', lineHeight: 1.05, margin: 0 }}>
          Salut{' '}<span style={{ color:'var(--red)' }}>{auteur}</span>.
        </h1>

        <div style={{ fontSize: 13, color:'var(--ink-soft)', marginTop: 12, lineHeight: 1.5 }}>
          {mineOpen > 0
            ? <>Tu as <b style={{ color:'var(--ink)' }}>{mineOpen}</b> visite{mineOpen>1?'s':''} en cours.</>
            : visited === 0
              ? <>Première visite ? Choisis une gare et c'est parti.</>
              : <>Tout est à jour de ton côté.</>}
          {lastMine && mineOpen > 0 && (
            <> Reprends&nbsp;
              <button onClick={() => onOpen(lastMine.gare)} style={{
                color:'var(--red)', fontWeight:600, textDecoration:'underline',
                textUnderlineOffset:'2px'
              }}>{lastMine.gare} →</button>
            </>
          )}
        </div>

        {/* SCOREBOARD — 3 cellules claires : validées / en cours / restantes */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap: 8, margin:'22px 0 14px' }}>
          <div style={{
            background:'var(--white)', border:'1px solid var(--border)',
            borderTop: '3px solid var(--green)', borderRadius: 2, padding:'12px 12px 10px'
          }}>
            <div className="tabular" style={{ fontFamily:'var(--font-display)', fontWeight:700,
              fontSize: 32, lineHeight: 1, letterSpacing:'-0.04em', color:'var(--ink)' }}>{fullyDone}</div>
            <div style={{ fontSize: 9.5, letterSpacing:'0.14em', textTransform:'uppercase',
              color:'var(--green)', fontWeight:700, marginTop: 6 }}>Validée{fullyDone>1?'s':''}</div>
            <div style={{ fontSize:10, color:'var(--taupe)', marginTop:2 }}>tous critères OK</div>
          </div>
          <div style={{
            background:'var(--white)', border:'1px solid var(--border)',
            borderTop: '3px solid var(--red)', borderRadius: 2, padding:'12px 12px 10px',
            position:'relative', overflow:'hidden'
          }}>
            <div className="tabular" style={{ fontFamily:'var(--font-display)', fontWeight:700,
              fontSize: 32, lineHeight: 1, letterSpacing:'-0.04em', color:'var(--ink)' }}>{inProgress}</div>
            <div style={{ fontSize: 9.5, letterSpacing:'0.14em', textTransform:'uppercase',
              color:'var(--red)', fontWeight:700, marginTop: 6, display:'flex', alignItems:'center', gap:5 }}>
              <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--red)',
                animation:'sermBlink 1.4s ease-in-out infinite' }}/>
              En cours
            </div>
            <div style={{ fontSize:10, color:'var(--taupe)', marginTop:2 }}>à terminer</div>
          </div>
          <div style={{
            background:'var(--paper)', border:'1px dashed var(--border)',
            borderRadius: 2, padding:'12px 12px 10px'
          }}>
            <div className="tabular" style={{ fontFamily:'var(--font-display)', fontWeight:700,
              fontSize: 32, lineHeight: 1, letterSpacing:'-0.04em', color:'var(--taupe)' }}>{totalGares - visited}</div>
            <div style={{ fontSize: 9.5, letterSpacing:'0.14em', textTransform:'uppercase',
              color:'var(--taupe)', fontWeight:700, marginTop: 6 }}>À visiter</div>
            <div style={{ fontSize:10, color:'var(--taupe-light)', marginTop:2 }}>sur {totalGares} gares</div>
          </div>
        </div>

        {/* RIBBON + label clair */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom: 6 }}>
            <span style={{ fontSize: 10, letterSpacing:'0.12em', textTransform:'uppercase',
              color:'var(--ink)', fontWeight:700 }}>Avancement réseau</span>
            <span className="tabular" style={{ fontSize: 11, color:'var(--ink-soft)', fontWeight:600 }}>
              <b style={{ color:'var(--ink)' }}>{visited}</b>
              <span style={{ color:'var(--taupe-light)' }}> sur {totalGares} gares</span>
              <span style={{ color:'var(--taupe)' }}> · {Math.round(visited/totalGares*100)}%</span>
            </span>
          </div>
          <div style={{ height: 10, display:'flex', gap: 2, padding: '1px',
            background:'var(--paper-deep)', border:'1px solid var(--border)', borderRadius: 1 }}>
            {ribbon.map((s, i) => (
              <div key={i} style={{
                flex: 1,
                background: s === 'done' ? 'var(--green)'
                          : s === 'wip'  ? 'var(--red)'
                          : 'transparent',
                animation: s === 'wip' ? 'sermBlink 2s ease-in-out infinite' : 'none'
              }} />
            ))}
          </div>
        </div>

        <button onClick={onPick} className="serm-cta" style={{
          width:'100%', padding:'20px 22px',
          background:'var(--red)', color:'var(--paper-light)',
          fontFamily:'var(--font-display)', fontSize: 17, fontWeight: 600,
          letterSpacing:'0.04em',
          borderRadius: 2, position:'relative', overflow:'hidden',
          boxShadow:'0 14px 32px -10px rgba(200,16,46,0.55), 0 2px 0 rgba(0,0,0,0.08)',
          display:'flex', alignItems:'center', justifyContent:'space-between', gap: 10,
          transition:'transform .15s ease, box-shadow .15s ease'
        }}
          onMouseDown={(e)=>{ e.currentTarget.style.transform='translateY(1px)'; }}
          onMouseUp={(e)=>{ e.currentTarget.style.transform='translateY(0)'; }}
          onMouseLeave={(e)=>{ e.currentTarget.style.transform='translateY(0)'; }}>
          {/* shimmer band */}
          <span aria-hidden style={{
            position:'absolute', top:0, bottom:0, width:'40%', left:'-50%',
            background:'linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent)',
